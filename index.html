<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cybersecurity Acronyms Reference</title>
<meta name="description" content="A searchable, filterable reference of cybersecurity acronyms — from AAA to ZTNA, with full definitions organized by category." />
<meta property="og:title" content="Cybersecurity Acronyms Reference" />
<meta property="og:description" content="Every acronym you need to know — searchable, filterable, shareable. Hundreds of terms across Network, Crypto, Compliance, Threat, and more." />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="Cybersecurity Acronyms Reference" />
<meta name="twitter:description" content="Every acronym you need to know — searchable, filterable, shareable." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e14;
    --surface: #111720;
    --surface2: #19212e;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8edf4;
    --muted: #7d8fa8;
    --accent: #00e5a0;
    --accent2: #0099ff;
    --network: #0099ff;
    --threat: #ff4757;
    --crypto: #a78bfa;
    --compliance: #34d399;
    --protocol: #38bdf8;
    --identity: #fb923c;
    --operations: #f472b6;
    --infra: #facc15;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 3rem 2rem 2rem;
    max-width: 1200px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }

  .header-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: clamp(1.8rem, 5vw, 3.2rem);
    font-weight: 600;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 2rem;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 420px;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    width: 16px; height: 16px;
  }

  input[type="text"] {
    width: 100%;
    padding: 10px 12px 10px 38px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 8px 14px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { color: var(--bg); font-weight: 600; }

  .filter-btn[data-cat=""].active    { background: var(--accent); border-color: var(--accent); }
  .filter-btn[data-cat="network"].active    { background: var(--network); border-color: var(--network); }
  .filter-btn[data-cat="threat"].active     { background: var(--threat); border-color: var(--threat); }
  .filter-btn[data-cat="crypto"].active     { background: var(--crypto); border-color: var(--crypto); }
  .filter-btn[data-cat="compliance"].active { background: var(--compliance); border-color: var(--compliance); }
  .filter-btn[data-cat="protocol"].active   { background: var(--protocol); border-color: var(--protocol); }
  .filter-btn[data-cat="identity"].active   { background: var(--identity); border-color: var(--identity); }
  .filter-btn[data-cat="operations"].active { background: var(--operations); border-color: var(--operations); }
  .filter-btn[data-cat="infra"].active      { background: var(--infra); border-color: var(--infra); }

  /* A-Z nav */
  .az-nav {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0.75rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
  }

  .az-btn {
    padding: 4px 7px;
    border-radius: 3px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.12s;
    min-width: 26px;
    text-align: center;
  }

  .az-btn:hover:not(.az-disabled) { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  .az-btn.az-disabled { opacity: 0.25; cursor: default; pointer-events: none; }

  main {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
  }

  .stats-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    gap: 8px;
  }

  .stats-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .stats-count span { color: var(--accent); }

  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    padding: 6px 10px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
  }
  .view-btn.active { background: var(--surface2); color: var(--text); }

  /* CARD GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .grid.list-view {
    grid-template-columns: 1fr;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    cursor: default;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    animation: fadeIn 0.3s ease both;
    /* no overflow:hidden — lets the copy tooltip escape the card boundary */
    z-index: 1;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 8px 8px 0 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover { border-color: var(--border2); transform: translateY(-1px); z-index: 10; }
  .card:hover::before { opacity: 1; }
  .card:hover .copy-btn { opacity: 1; }

  .card[data-cat="network"]::before    { background: var(--network); }
  .card[data-cat="threat"]::before     { background: var(--threat); }
  .card[data-cat="crypto"]::before     { background: var(--crypto); }
  .card[data-cat="compliance"]::before { background: var(--compliance); }
  .card[data-cat="protocol"]::before   { background: var(--protocol); }
  .card[data-cat="identity"]::before   { background: var(--identity); }
  .card[data-cat="operations"]::before { background: var(--operations); }
  .card[data-cat="infra"]::before      { background: var(--infra); }

  .card.highlighted {
    animation: highlight 1.8s ease both;
  }

  @keyframes highlight {
    0%   { box-shadow: 0 0 0 2px var(--accent); border-color: var(--accent); }
    70%  { box-shadow: 0 0 0 2px var(--accent); border-color: var(--accent); }
    100% { box-shadow: none; border-color: var(--border); }
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }

  .card-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }

  .acronym-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    line-height: 1;
    cursor: pointer;
    text-decoration: none;
  }

  .acronym-text:hover { text-decoration: underline; text-underline-offset: 3px; }

  .card[data-cat="network"]    .acronym-text { color: var(--network); }
  .card[data-cat="threat"]     .acronym-text { color: var(--threat); }
  .card[data-cat="crypto"]     .acronym-text { color: var(--crypto); }
  .card[data-cat="compliance"] .acronym-text { color: var(--compliance); }
  .card[data-cat="protocol"]   .acronym-text { color: var(--protocol); }
  .card[data-cat="identity"]   .acronym-text { color: var(--identity); }
  .card[data-cat="operations"] .acronym-text { color: var(--operations); }
  .card[data-cat="infra"]      .acronym-text { color: var(--infra); }

  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card[data-cat="network"]    .badge { background: rgba(0,153,255,0.12); color: var(--network); }
  .card[data-cat="threat"]     .badge { background: rgba(255,71,87,0.12); color: var(--threat); }
  .card[data-cat="crypto"]     .badge { background: rgba(167,139,250,0.12); color: var(--crypto); }
  .card[data-cat="compliance"] .badge { background: rgba(52,211,153,0.12); color: var(--compliance); }
  .card[data-cat="protocol"]   .badge { background: rgba(56,189,248,0.12); color: var(--protocol); }
  .card[data-cat="identity"]   .badge { background: rgba(251,146,60,0.12); color: var(--identity); }
  .card[data-cat="operations"] .badge { background: rgba(244,114,182,0.12); color: var(--operations); }
  .card[data-cat="infra"]      .badge { background: rgba(250,204,21,0.12); color: var(--infra); }

  .copy-btn {
    opacity: 0;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--muted);
    font-size: 12px;
    padding: 3px 7px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    font-family: 'IBM Plex Mono', monospace;
    position: relative;
  }

  .copy-btn::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 7px);
    right: 0;
    background: var(--surface2);
    color: var(--text);
    font-size: 11px;
    padding: 5px 9px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }

  .copy-btn:hover::after { opacity: 1; }
  .copy-btn.copied::after { opacity: 1; }

  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .copy-btn.copied { opacity: 1; color: var(--accent); border-color: var(--accent); }

  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }

  .filter-btn:focus-visible,
  .view-btn:focus-visible,
  .az-btn:focus-visible,
  .copy-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .full-name {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 7px;
    font-weight: 300;
    line-height: 1.4;
  }

  .definition {
    font-size: 13px;
    color: #aab4c4;
    line-height: 1.6;
    font-weight: 300;
  }

  /* LIST VIEW card tweaks */
  .list-view .card {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 20px;
    padding: 14px 18px;
  }

  .list-view .list-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 120px;
    flex-shrink: 0;
  }

  .list-view .list-body {
    flex: 1;
    min-width: 0;
  }

  .list-view .list-body .full-name { margin-bottom: 5px; }

  .list-view .copy-btn {
    flex-shrink: 0;
    opacity: 1;
    margin-top: 2px;
  }

  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
  }

  .no-results span { color: var(--accent); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  @media (max-width: 600px) {
    header, main { padding-left: 1rem; padding-right: 1rem; }
    h1 { font-size: 1.6rem; }
    .list-view .card { flex-wrap: wrap; }
    .list-view .list-left { flex-direction: row; align-items: center; width: auto; flex-wrap: wrap; gap: 8px; }
    .list-view .list-body { width: 100%; flex: none; }
    .filters { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; }
    .filters::-webkit-scrollbar { height: 3px; }
    .filters::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .az-nav { padding-left: 1rem; padding-right: 1rem; }
    .copy-btn { opacity: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="header-tag">// reference guide</div>
  <h1><span id="total-count">—</span> Cybersecurity<br>Acronyms</h1>
  <p class="subtitle">Every acronym you need to know — searchable, filterable, shareable.</p>

  <div class="controls">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <label for="search" class="sr-only">Search acronyms</label>
      <input type="text" id="search" placeholder="Search acronyms, names, definitions… (press / to focus)" oninput="render();saveState()" />
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-cat="" data-label="All" onclick="setFilter('')">All</button>
      <button class="filter-btn" data-cat="network" data-label="Network" onclick="setFilter('network')">Network</button>
      <button class="filter-btn" data-cat="threat" data-label="Threat &amp; Attack" onclick="setFilter('threat')">Threat &amp; Attack</button>
      <button class="filter-btn" data-cat="crypto" data-label="Crypto" onclick="setFilter('crypto')">Crypto</button>
      <button class="filter-btn" data-cat="compliance" data-label="Compliance" onclick="setFilter('compliance')">Compliance</button>
      <button class="filter-btn" data-cat="protocol" data-label="Protocols" onclick="setFilter('protocol')">Protocols</button>
      <button class="filter-btn" data-cat="identity" data-label="Identity" onclick="setFilter('identity')">Identity</button>
      <button class="filter-btn" data-cat="operations" data-label="Operations" onclick="setFilter('operations')">Operations</button>
      <button class="filter-btn" data-cat="infra" data-label="Infrastructure" onclick="setFilter('infra')">Infrastructure</button>
    </div>
  </div>
</header>

<nav class="az-nav" id="az-nav" aria-label="Jump to letter"></nav>

<main>
  <div class="stats-bar">
    <div class="stats-count" id="stats"></div>
    <div class="view-toggle">
      <button class="view-btn active" id="grid-btn" onclick="setView('grid')" title="Grid view" aria-label="Grid view">⊞</button>
      <button class="view-btn" id="list-btn" onclick="setView('list')" title="List view" aria-label="List view">☰</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
</main>

<footer id="footer">CYBERSECURITY ACRONYM REFERENCE &nbsp;·&nbsp; — TERMS</footer>

<script>
const data = [
  {a:"AAA",f:"Authentication, Authorization, Accounting",d:"Framework for controlling network access through user verification, permissions, and activity logging.",c:"identity"},
  {a:"ACL",f:"Access Control List",d:"Rules that define which users or systems can access specific resources.",c:"identity"},
  {a:"AES",f:"Advanced Encryption Standard",d:"Symmetric block cipher widely used for data encryption, available in 128/192/256-bit key sizes.",c:"crypto"},
  {a:"APT",f:"Advanced Persistent Threat",d:"Sophisticated, long-term cyberattack by well-resourced adversaries targeting specific organizations.",c:"threat"},
  {a:"ARP",f:"Address Resolution Protocol",d:"Maps IP addresses to physical MAC addresses on a local network.",c:"protocol"},
  {a:"BYOD",f:"Bring Your Own Device",d:"Policy allowing employees to use personal devices for work, introducing unique security challenges.",c:"compliance"},
  {a:"CA",f:"Certificate Authority",d:"Trusted entity that issues digital certificates verifying the identity of websites and organizations.",c:"crypto"},
  {a:"CASB",f:"Cloud Access Security Broker",d:"Security policy enforcement point between cloud users and cloud services.",c:"infra"},
  {a:"CICD",f:"Continuous Integration / Continuous Deployment",d:"DevOps practice of automating build, test, and deployment pipelines.",c:"operations"},
  {a:"CISO",f:"Chief Information Security Officer",d:"Senior executive responsible for an organization's information and data security strategy.",c:"compliance"},
  {a:"CTEM",f:"Continuous Threat Exposure Management",d:"Ongoing process to identify, assess, and reduce an organization's attack surface.",c:"threat"},
  {a:"CVE",f:"Common Vulnerabilities and Exposures",d:"Publicly disclosed cybersecurity vulnerabilities assigned a unique identifier.",c:"threat"},
  {a:"CVSS",f:"Common Vulnerability Scoring System",d:"Standardized framework for rating the severity of security vulnerabilities on a 0–10 scale.",c:"threat"},
  {a:"DDoS",f:"Distributed Denial of Service",d:"Attack that floods a target with traffic from many sources, making it unavailable.",c:"threat"},
  {a:"DEP",f:"Data Execution Prevention",d:"Security feature that prevents code from running in memory regions marked as non-executable.",c:"threat"},
  {a:"DFIR",f:"Digital Forensics and Incident Response",d:"Combined discipline of investigating cyber incidents and collecting digital evidence.",c:"operations"},
  {a:"DLP",f:"Data Loss Prevention",d:"Tools and policies that detect and prevent unauthorized transmission of sensitive data.",c:"compliance"},
  {a:"DMZ",f:"Demilitarized Zone",d:"Network segment that separates internal systems from the public internet, hosting externally accessible services.",c:"network"},
  {a:"DNS",f:"Domain Name System",d:"System that translates human-readable domain names into IP addresses.",c:"protocol"},
  {a:"DoS",f:"Denial of Service",d:"Attack that overwhelms a system to make it unavailable to legitimate users.",c:"threat"},
  {a:"EAP",f:"Extensible Authentication Protocol",d:"Authentication framework used in wireless networks and point-to-point connections.",c:"protocol"},

  {a:"FIM",f:"File Integrity Monitoring",d:"Process of validating OS and application files using checksums to detect unauthorized changes.",c:"operations"},

  {a:"FTP",f:"File Transfer Protocol",d:"Standard network protocol for transferring files — unencrypted, largely replaced by SFTP.",c:"protocol"},

  {a:"IPSec",f:"Internet Protocol Security",d:"Suite of protocols that encrypts and authenticates IP communications.",c:"crypto"},

  {a:"LDAP",f:"Lightweight Directory Access Protocol",d:"Protocol for accessing and maintaining distributed directory information services.",c:"protocol"},
  {a:"LUKS",f:"Linux Unified Key Setup",d:"Standard disk encryption specification for Linux.",c:"crypto"},
  {a:"MAC",f:"Mandatory Access Control",d:"Access control policy where the OS enforces permissions based on classification labels.",c:"identity"},
  {a:"MFA",f:"Multi-Factor Authentication",d:"Authentication requiring two or more verification factors: something you know, have, or are.",c:"identity"},
  {a:"MSP",f:"Managed Service Provider",d:"Third-party company that remotely manages a customer's IT infrastructure and systems.",c:"infra"},
  {a:"MSSP",f:"Managed Security Service Provider",d:"Outsourced provider specializing in security monitoring and management services.",c:"operations"},

  {a:"ML",f:"Machine Learning",d:"AI technique used in cybersecurity for anomaly detection, behavioral analysis, and threat classification.",c:"infra"},

  {a:"MPLS",f:"Multi-protocol Label Switching",d:"High-performance routing technique directing data using short path labels — used in enterprise WANs.",c:"network"},
  {a:"MSA",f:"Master Service Agreement",d:"Overarching contract between companies governing all future transactions and security responsibilities.",c:"compliance"},
  {a:"MSCHAP",f:"Microsoft Challenge Handshake Authentication Protocol",d:"Microsoft's version of CHAP used in Windows and VPN authentication.",c:"identity"},
  {a:"MaaS",f:"Monitoring as a Service",d:"Cloud-based monitoring solution for infrastructure, applications, and security events.",c:"infra"},
  {a:"MTTF",f:"Mean Time to Failure",d:"Average time a non-repairable system or component operates before failing.",c:"compliance"},
  {a:"MTU",f:"Maximum Transmission Unit",d:"Largest packet size a network can transmit — manipulated in some fragmentation-based attacks.",c:"network"},
  {a:"NFC",f:"Near Field Communication",d:"Short-range wireless communication used in contactless payments and access cards — vulnerable to eavesdropping.",c:"network"},
  {a:"NTFS",f:"New Technology File System",d:"Windows file system supporting permissions, encryption, and auditing via EFS and ACLs.",c:"infra"},
  {a:"NTLM",f:"New Technology LAN Manager",d:"Older Microsoft authentication protocol — vulnerable to pass-the-hash and relay attacks.",c:"identity"},
  {a:"OID",f:"Object Identifier",d:"Unique numeric identifier used in digital certificates and SNMP to identify objects.",c:"protocol"},
  {a:"OS",f:"Operating System",d:"Software managing hardware and providing services — hardening the OS is a core security practice.",c:"infra"},
  {a:"OT",f:"Operational Technology",d:"Hardware and software monitoring and controlling physical devices in industrial environments.",c:"infra"},
  {a:"OTA",f:"Over the Air",d:"Wireless method of distributing firmware and software updates to mobile and IoT devices.",c:"infra"},
  {a:"OVAL",f:"Open Vulnerability Assessment Language",d:"XML-based standard for describing system security states and assessment results.",c:"compliance"},
  {a:"P12",f:"PKCS #12",d:"File format storing a private key and certificate chain — protected by a password.",c:"crypto"},
  {a:"P2P",f:"Peer to Peer",d:"Decentralized network where devices communicate directly — used by some malware for C2 communications.",c:"threat"},
  {a:"PAC",f:"Proxy Auto Configuration",d:"Script that tells a browser which proxy server to use — can be hijacked in WPAD attacks.",c:"network"},
  {a:"PAP",f:"Password Authentication Protocol",d:"Simple authentication protocol sending passwords in plaintext — considered insecure.",c:"identity"},
  {a:"PAT",f:"Port Address Translation",d:"Maps multiple private IPs to a single public IP using different ports — extends NAT.",c:"network"},
  {a:"PBX",f:"Private Branch Exchange",d:"Internal telephone system — voice phishing and vishing attacks often target PBX systems.",c:"threat"},
  {a:"PDU",f:"Power Distribution Unit",d:"Device distributing electrical power in a data center — physical security and resilience consideration.",c:"infra"},
  {a:"PED",f:"Personal Electronic Device",d:"Any portable electronic device — relevant in BYOD policies and physical security controls.",c:"compliance"},
  {a:"PEM",f:"Privacy Enhanced Mail",d:"Base64-encoded certificate format commonly used for TLS certificates and private keys.",c:"crypto"},
  {a:"PKCS",f:"Public Key Cryptography Standards",d:"Set of RSA Security standards defining formats for cryptographic keys, certificates, and messages.",c:"crypto"},
  {a:"POP",f:"Post Office Protocol",d:"Protocol for retrieving email from a server — downloads messages and typically removes them from server.",c:"protocol"},
  {a:"POTS",f:"Plain Old Telephone Service",d:"Traditional analog telephone network — relevant in legacy infrastructure and vishing attack context.",c:"network"},
  {a:"PPP",f:"Point-to-Point Protocol",d:"Data link protocol for direct connections between two nodes — used in dial-up and some VPN tunnels.",c:"protocol"},
  {a:"PPTP",f:"Point-to-Point Tunneling Protocol",d:"VPN protocol considered insecure due to weak encryption — largely replaced by L2TP/IPSec and OpenVPN.",c:"network"},
  {a:"PSK",f:"Pre-shared Key",d:"Secret value shared between parties before communication — used in WPA2-Personal and IPSec.",c:"crypto"},
  {a:"PTZ",f:"Pan-Tilt-Zoom",d:"Type of surveillance camera with remote directional and zoom control — used in physical security.",c:"compliance"},
  {a:"PUP",f:"Potentially Unwanted Program",d:"Software installed without clear consent that may display ads, track usage, or degrade performance.",c:"threat"},
  {a:"RA",f:"Registration Authority",d:"Entity that verifies identity before a CA issues a digital certificate.",c:"crypto"},
  {a:"RACE",f:"Research and Development in Advanced Communications Technologies in Europe",d:"European research initiative that produced cryptographic algorithms like RIPEMD.",c:"crypto"},
  {a:"RAD",f:"Rapid Application Development",d:"Software development methodology emphasizing speed — security must be integrated, not bolted on.",c:"compliance"},
  {a:"RAID",f:"Redundant Array of Inexpensive Disks",d:"Storage technology combining multiple drives for redundancy or performance — relevant in data availability.",c:"infra"},
  {a:"RAS",f:"Remote Access Server",d:"Server enabling remote users to connect to an internal network — a key attack target.",c:"network"},
  {a:"RFID",f:"Radio Frequency Identification",d:"Wireless technology using electromagnetic fields to identify tags — used in access badges and asset tracking.",c:"identity"},
  {a:"RIPEMD",f:"RACE Integrity Primitives Evaluation Message Digest",d:"Cryptographic hash function family developed in Europe — alternative to SHA.",c:"crypto"},
  {a:"ROI",f:"Return on Investment",d:"Financial metric used to justify security spending by comparing cost to risk reduction benefit.",c:"compliance"},
  {a:"RTBH",f:"Remotely Triggered Black Hole",d:"Network technique dropping traffic from specific sources to mitigate DDoS attacks at the routing level.",c:"network"},
  {a:"RTP",f:"Real-time Transport Protocol",d:"Protocol for delivering audio and video over IP networks — used in VoIP and video conferencing.",c:"protocol"},
  {a:"SAE",f:"Simultaneous Authentication of Equals",d:"Authentication protocol used in WPA3 replacing PSK — resistant to offline dictionary attacks.",c:"crypto"},
  {a:"SAN",f:"Storage Area Network",d:"High-speed network providing block-level storage access — requires strong access controls.",c:"infra"},
  {a:"SCEP",f:"Simple Certificate Enrollment Protocol",d:"Protocol for automating certificate enrollment for network devices.",c:"crypto"},
  {a:"SDK",f:"Software Development Kit",d:"Collection of tools for building applications — insecure SDKs introduce vulnerabilities into software.",c:"operations"},
  {a:"SDLM",f:"Software Development Lifecycle Methodology",d:"Structured approach to software development integrating security at every phase.",c:"compliance"},
  {a:"SED",f:"Self-encrypting Drive",d:"Storage drive with built-in hardware encryption that automatically encrypts all stored data.",c:"crypto"},
  {a:"SEH",f:"Structured Exception Handler",d:"Windows mechanism for handling errors — exploited in SEH-based buffer overflow attacks.",c:"threat"},
  {a:"SELinux",f:"Security-enhanced Linux",d:"Linux kernel security module providing mandatory access controls — used to confine processes.",c:"infra"},
  {a:"SHTTP",f:"Secure Hypertext Transfer Protocol",d:"Early alternative to HTTPS for securing web communications — largely obsolete.",c:"protocol"},
  {a:"SIM",f:"Subscriber Identity Module",d:"Smart card in mobile devices storing identity credentials — target of SIM swapping attacks.",c:"identity"},
  {a:"SMS",f:"Short Message Service",d:"Text messaging protocol — used as an MFA factor and a vector for smishing attacks.",c:"threat"},
  {a:"SOAP",f:"Simple Object Access Protocol",d:"XML-based messaging protocol for web services — relevant in API security and XML injection.",c:"protocol"},
  {a:"SOW",f:"Statement of Work",d:"Document defining specific work activities, deliverables, and timelines — includes security requirements.",c:"compliance"},
  {a:"SPIM",f:"Spam over Internet Messaging",d:"Unsolicited bulk messages sent via instant messaging platforms — a social engineering vector.",c:"threat"},
  {a:"SRTP",f:"Secure Real-Time Protocol",d:"Encrypted version of RTP providing confidentiality and authentication for VoIP and video.",c:"protocol"},
  {a:"SSD",f:"Solid State Drive",d:"Flash-based storage device — secure deletion is more complex than with traditional HDDs.",c:"infra"},
  {a:"TGT",f:"Ticket Granting Ticket",d:"Kerberos token issued after initial authentication used to request service tickets without re-entering credentials.",c:"identity"},
  {a:"TKIP",f:"Temporal Key Integrity Protocol",d:"Encryption protocol used in WPA — considered weak and replaced by CCMP/AES in WPA2.",c:"crypto"},
  {a:"TOC",f:"Time-of-check",d:"First part of a TOCTOU race condition — the moment a security check is performed.",c:"threat"},
  {a:"TOU",f:"Time-of-use",d:"Second part of a TOCTOU race condition — the moment a resource is actually used after the check.",c:"threat"},
  {a:"TSIG",f:"Transaction Signature",d:"DNS security mechanism using shared secret keys to authenticate DNS messages between servers.",c:"protocol"},
  {a:"TTP",f:"Tactics, Techniques, and Procedures",d:"Describes the specific behavior and methods of a threat actor — used in threat intelligence reports.",c:"threat"},
  {a:"UAV",f:"Unmanned Aerial Vehicle",d:"Drone — relevant in physical security as a surveillance or attack delivery platform.",c:"compliance"},
  {a:"UEFI",f:"Unified Extensible Firmware Interface",d:"Modern replacement for BIOS — can be targeted by bootkits and firmware implants.",c:"infra"},
  {a:"URI",f:"Uniform Resource Identifier",d:"String identifying a resource — broader than URL, includes URNs and other resource identifiers.",c:"protocol"},
  {a:"USB",f:"Universal Serial Bus",d:"Common connection interface — USB drops and HID attacks are well-known physical attack vectors.",c:"threat"},
  {a:"UTP",f:"Unshielded Twisted Pair",d:"Common network cabling — physical access to UTP enables packet sniffing and wiretapping.",c:"network"},
  {a:"VBA",f:"Visual Basic for Applications",d:"Microsoft scripting language embedded in Office documents — heavily abused in macro malware.",c:"threat"},
  {a:"VDE",f:"Virtual Desktop Environment",d:"Isolated virtual desktop instance — similar to VDI, used to contain user activity.",c:"infra"},
  {a:"VM",f:"Virtual Machine",d:"Software emulation of a physical computer — VM escape attacks attempt to break out of the hypervisor.",c:"infra"},
  {a:"VTC",f:"Video Teleconferencing",d:"Real-time video communication system — relevant in remote work security and eavesdropping risks.",c:"infra"},
  {a:"VoIP",f:"Voice over IP",d:"Technology delivering voice calls over IP networks — vulnerable to eavesdropping and toll fraud.",c:"protocol"},
  {a:"WAP",f:"Wireless Access Point",d:"Device connecting wireless clients to a wired network — rogue WAPs are a common attack tool.",c:"network"},
  {a:"WEP",f:"Wired Equivalent Privacy",d:"Original Wi-Fi encryption standard — cryptographically broken and must never be used.",c:"crypto"},
  {a:"WO",f:"Work Order",d:"Document authorizing and detailing specific IT or security work to be performed.",c:"compliance"},
  {a:"WPA",f:"Wi-Fi Protected Access",d:"Wi-Fi security protocol replacing WEP — WPA2 and WPA3 are the current standards.",c:"crypto"},
  {a:"WPS",f:"Wi-Fi Protected Setup",d:"Feature for easily connecting devices to Wi-Fi — vulnerable to brute-force PIN attacks.",c:"network"},
  {a:"WTLS",f:"Wireless TLS",d:"TLS adapted for wireless devices with limited processing power — largely obsolete.",c:"crypto"},
  {a:"XML",f:"Extensible Markup Language",d:"Flexible markup language used in web services and configs — vulnerable to XXE injection attacks.",c:"protocol"},
  {a:"XOR",f:"Exclusive Or",d:"Fundamental binary operation used in many encryption algorithms and hash functions.",c:"crypto"},
  {a:"XSRF",f:"Cross-site Request Forgery",d:"Alternate acronym for CSRF — same attack tricking authenticated users into submitting malicious requests.",c:"threat"},
  {a:"QUIC",f:"Quick UDP Internet Connections",d:"Modern transport protocol developed by Google using UDP — designed to reduce latency and is the basis of HTTP/3.",c:"protocol"},
  {a:"WPA2",f:"Wi-Fi Protected Access 2",d:"Current mainstream Wi-Fi security standard using AES/CCMP encryption — replaced WPA.",c:"crypto"},
  {a:"WPA3",f:"Wi-Fi Protected Access 3",d:"Latest Wi-Fi security standard using SAE instead of PSK — provides stronger protection against brute-force attacks.",c:"crypto"},
  {a:"802.1X",f:"IEEE 802.1X Port-based Network Access Control",d:"Standard for port-based NAC — requires authentication before granting network access, used in enterprise Wi-Fi and wired networks.",c:"protocol"},
  {a:"DoH",f:"DNS over HTTPS",d:"Protocol encrypting DNS queries inside HTTPS traffic to prevent eavesdropping and manipulation.",c:"protocol"},
  {a:"DoT",f:"DNS over TLS",d:"Protocol encrypting DNS queries using TLS to protect DNS traffic from interception.",c:"protocol"},
  {a:"DNSSEC",f:"Domain Name System Security Extensions",d:"Suite of extensions adding cryptographic signatures to DNS records to prevent spoofing and cache poisoning.",c:"protocol"},
];

const labelMap = {
  network:"Network", threat:"Threat & Attack", crypto:"Crypto & Privacy",
  compliance:"Compliance & GRC", protocol:"Protocols", identity:"Identity & Access",
  operations:"Operations & IR", infra:"Infrastructure"
};

let currentCat = '';
let currentView = 'grid';

function anchorId(a) {
  return 'card-' + a.replace(/[^a-zA-Z0-9]/g, '_');
}

function saveState() {
  const q = document.getElementById('search').value;
  try {
    localStorage.setItem('cybercat', currentCat);
    localStorage.setItem('cyberview', currentView);
  } catch(e) {}
  const params = new URLSearchParams();
  if (currentCat) params.set('cat', currentCat);
  if (q) params.set('q', q);
  const qs = params.toString();
  history.replaceState(null, '', (qs ? '?' + qs : window.location.pathname) + window.location.hash);
}

function setFilter(cat) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  render();
  saveState();
}

function setView(v) {
  currentView = v;
  const grid = document.getElementById('grid');
  grid.classList.toggle('list-view', v === 'list');
  document.getElementById('grid-btn').classList.toggle('active', v === 'grid');
  document.getElementById('list-btn').classList.toggle('active', v === 'list');
  try { localStorage.setItem('cyberview', v); } catch(e) {}
}

function escAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyCard(btn) {
  const text = btn.dataset.a + ' — ' + btn.dataset.f + ': ' + btn.dataset.d;
  function onSuccess() {
    btn.textContent = '✓';
    btn.dataset.tip = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '⎘';
      btn.dataset.tip = 'Copy definition';
      btn.classList.remove('copied');
    }, 1400);
  }
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(() => fallbackCopy(text, onSuccess));
  } else {
    fallbackCopy(text, onSuccess);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {}
  document.body.removeChild(ta);
}

function setHash(acronym) {
  history.replaceState(null, '', '#' + encodeURIComponent(acronym));
}

function jumpToLetter(letter) {
  const cards = document.querySelectorAll('.card');
  for (const card of cards) {
    const t = card.querySelector('.acronym-text');
    if (t && t.textContent.trim()[0].toUpperCase() === letter) {
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      break;
    }
  }
}

function updateAZNav(filtered) {
  const activeLetters = new Set(filtered.map(x => x.a[0].toUpperCase()));
  const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  document.getElementById('az-nav').innerHTML = chars.map(c =>
    `<button class="az-btn${activeLetters.has(c) ? '' : ' az-disabled'}" onclick="jumpToLetter('${c}')">${c}</button>`
  ).join('');
}

function updateFilterCounts(q) {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const cat = btn.dataset.cat;
    const label = btn.dataset.label;
    const count = data.filter(x => {
      const mq = !q || x.a.toLowerCase().includes(q) || x.f.toLowerCase().includes(q) || x.d.toLowerCase().includes(q);
      const mc = cat === '' ? true : x.c === cat;
      return mq && mc;
    }).length;
    btn.textContent = label + ' (' + count + ')';
  });
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = data.filter(x => {
    const mq = !q || x.a.toLowerCase().includes(q) || x.f.toLowerCase().includes(q) || x.d.toLowerCase().includes(q);
    const mc = !currentCat || x.c === currentCat;
    return mq && mc;
  });

  document.getElementById('stats').innerHTML =
    'Showing <span>' + filtered.length + '</span> of <span>' + data.length + '</span> acronyms';

  updateAZNav(filtered);
  updateFilterCounts(q);

  const grid = document.getElementById('grid');

  if (!filtered.length) {
    const safeQ = document.getElementById('search').value.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    grid.innerHTML = '<div class="no-results">No results for "<span>' + safeQ + '</span>"</div>';
    return;
  }

  const makeCard = (x, i, listView) => {
    const id = anchorId(x.a);
    const copyBtn = '<button class="copy-btn" data-a="' + escAttr(x.a) + '" data-f="' + escAttr(x.f) + '" data-d="' + escAttr(x.d) + '" data-tip="Copy definition" onclick="event.stopPropagation();copyCard(this)">⎘</button>';
    if (listView) {
      return '<div class="card" id="' + id + '" data-cat="' + x.c + '" style="animation-delay:' + Math.min(i*0.02,0.4) + 's">' +
        '<div class="list-left">' +
          '<span class="acronym-text" onclick="setHash(\'' + x.a.replace(/'/g,"\\'") + '\')" title="Copy link">' + x.a + '</span>' +
          '<span class="badge">' + labelMap[x.c] + '</span>' +
        '</div>' +
        '<div class="list-body">' +
          '<div class="full-name">' + x.f + '</div>' +
          '<div class="definition">' + x.d + '</div>' +
        '</div>' +
        copyBtn +
      '</div>';
    }
    return '<div class="card" id="' + id + '" data-cat="' + x.c + '" style="animation-delay:' + Math.min(i*0.02,0.4) + 's">' +
      '<div class="card-header">' +
        '<div class="card-header-left">' +
          '<span class="acronym-text" onclick="setHash(\'' + x.a.replace(/'/g,"\\'") + '\')" title="Copy link">' + x.a + '</span>' +
        '</div>' +
        '<span class="badge">' + labelMap[x.c] + '</span>' +
        copyBtn +
      '</div>' +
      '<div class="full-name">' + x.f + '</div>' +
      '<div class="definition">' + x.d + '</div>' +
    '</div>';
  };

  grid.innerHTML = filtered.map((x, i) => makeCard(x, i, currentView === 'list')).join('');
}

function initFromHash() {
  const hash = decodeURIComponent(window.location.hash.slice(1));
  if (!hash) return;
  const match = data.find(x => x.a.toLowerCase() === hash.toLowerCase());
  if (!match) return;
  // Deep link always overrides saved filter so the card is always visible
  currentCat = '';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === ''));
  document.getElementById('search').value = match.a;
  render();
  setTimeout(() => {
    const el = document.getElementById(anchorId(match.a));
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.add('highlighted');
    }
  }, 120);
}

// Init
document.getElementById('total-count').textContent = data.length;
document.getElementById('footer').textContent =
  'CYBERSECURITY ACRONYM REFERENCE  ·  ' + data.length + ' TERMS';
// Sort alphabetically
data.sort((a, b) => a.a.localeCompare(b.a, undefined, {sensitivity: 'base'}));

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  const search = document.getElementById('search');
  if (e.key === '/' && document.activeElement !== search) {
    e.preventDefault();
    search.focus();
    search.select();
  }
  if (e.key === 'Escape') {
    if (search.value) { search.value = ''; render(); saveState(); }
    else search.blur();
  }
});

// Restore state: URL params take priority, localStorage as fallback
(function restoreState() {
  const params = new URLSearchParams(window.location.search);
  const urlCat = params.get('cat') || '';
  const urlQ   = params.get('q')   || '';
  let storedView = 'grid';
  try { storedView = localStorage.getItem('cyberview') || 'grid'; } catch(e) {}

  if (urlQ) document.getElementById('search').value = urlQ;

  const cat = urlCat || (() => { try { return localStorage.getItem('cybercat') || ''; } catch(e) { return ''; } })();
  if (cat) {
    currentCat = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  }
  if (storedView === 'list') setView('list');
})();

render();
initFromHash();
</script>
</body>
</html>
