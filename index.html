  {a:"HTTPS",f:"HTTP Secure",d:"HTTP over TLS/SSL, encrypting data in transit between client and server.",c:"protocol"},
  {a:"IAM",f:"Identity and Access Management",d:"Framework for managing digital identities and controlling resource access.",c:"identity",why:"Controls who can access which systems and data. Nearly every security program and audit starts here.",ex:"Okta, Microsoft Entra ID, and Ping Identity are common IAM platforms.",domains:["iam", "secplus"],roles:["IAM Analyst", "Identity Engineer", "Access Administrator"],tools:["Okta", "Microsoft Entra ID", "SailPoint"]},
  {a:"IDS",f:"Intrusion Detection System",d:"Monitors network or system traffic for suspicious activity and policy violations.",c:"operations",why:"Gives visibility into malicious traffic by alerting on it, the detective half of network defense.",ex:"Snort or Suricata raising an alert when it sees a known exploit signature on the wire.",domains:["soc", "net", "secplus"],iq:"What is the difference between an IDS and an IPS?",ia:"An IDS (Intrusion Detection System) watches traffic and alerts on suspicious activity but doesn't block it. It's passive and usually sits out-of-band. An IPS (Intrusion Prevention System) sits inline and can drop or block malicious traffic in real time. The trade-off is that an inline IPS adds latency, can become a point of failure, and a false positive there blocks legitimate traffic."},
  {a:"IPS",f:"Intrusion Prevention System",d:"Network security tool that monitors traffic and actively blocks detected threats.",c:"operations",why:"The preventive counterpart to an IDS. It sits inline and actively blocks malicious traffic instead of just alerting.",ex:"An inline IPS dropping packets that match an active exploit signature before they reach the server.",domains:["soc", "net", "secplus"]},
  {a:"IOC",f:"Indicator of Compromise",d:"Evidence on a network or system suggesting a security breach has occurred.",c:"threat",why:"Concrete evidence of a breach, like hashes, IPs, and domains, that defenders hunt for and share to catch the same attacker elsewhere.",ex:"Blocking a known-malicious file hash and C2 domain pulled from a threat-intel feed.",domains:["soc", "ti", "secplus"]},
  {a:"IOT",f:"Internet of Things",d:"Network of physical devices embedded with sensors and software that connect to the internet.",c:"infra"},
  {a:"IP",f:"Internet Protocol",d:"Principal communications protocol for routing data packets across networks.",c:"protocol"},
  {a:"IPSec",f:"Internet Protocol Security",d:"Suite of protocols that encrypts and authenticates IP communications.",c:"crypto",why:"Encrypts and authenticates IP traffic, the basis for most site-to-site VPNs.",ex:"Two offices linked over the internet by an IPSec tunnel.",domains:["net", "secplus"]},
  {a:"ISO",f:"International Organization for Standardization",d:"Body that develops international standards including ISO 27001 for information security.",c:"compliance",why:"Sets the international standard (ISO 27001) for information security management that customers and auditors look for.",ex:"Achieving ISO 27001 certification to win enterprise customers who require it.",domains:["grc", "compliance"]},
  {a:"LDAP",f:"Lightweight Directory Access Protocol",d:"Protocol for accessing and maintaining distributed directory information services.",c:"protocol"},
  {a:"LUKS",f:"Linux Unified Key Setup",d:"Standard disk encryption specification for Linux.",c:"crypto",why:"The standard for encrypting Linux disks, so a lost drive stays unreadable.",ex:"Turning on LUKS during an Ubuntu install.",domains:["secplus"]},
  {a:"MAC",f:"Mandatory Access Control",d:"Access control policy where the OS enforces permissions based on classification labels.",c:"identity",why:"Access control where the system enforces permissions from classification labels, and users can't override them.",ex:"A government system blocking a 'Secret'-cleared user from a 'Top Secret' file.",domains:["iam", "secplus"]},
  {a:"MFA",f:"Multi-Factor Authentication",d:"Authentication requiring two or more verification factors: something you know, have, or are.",c:"identity",why:"The single most effective control against credential theft. A stolen password on its own is no longer enough.",ex:"Approving a push notification or entering a TOTP code after typing your password.",domains:["iam", "secplus"]},
  {a:"MSP",f:"Managed Service Provider",d:"Third-party company that remotely manages a customer's IT infrastructure and systems.",c:"infra"},
  {a:"MSSP",f:"Managed Security Service Provider",d:"Outsourced provider specializing in security monitoring and management services.",c:"operations"},
  {a:"MTTR",f:"Mean Time to Repair",d:"Average time to repair or recover a system after a failure or security incident — a key operational metric.",c:"operations",why:"A core SOC metric for how fast you recover from an incident. Leadership uses it to gauge how mature the program is.",ex:"Cutting mean time to respond from hours to minutes by automating containment with SOAR.",domains:["soc", "grc"]},
  {a:"NAC",f:"Network Access Control",d:"Solution that enforces security policy compliance on devices before granting network access.",c:"network",why:"Enforces who and what can join the network. A device has to prove it's compliant before it gets access.",ex:"Cisco ISE quarantining a laptop that lacks current patches until it remediates.",domains:["net"],tools:["Cisco ISE", "Aruba ClearPass", "FortiNAC"]},
  {a:"NAT",f:"Network Address Translation",d:"Remaps one IP address space to another, commonly used to share a single public IP.",c:"network",why:"Lets many private devices share one public IP, and hides internal addresses from the outside.",ex:"A home router placing every device behind a single ISP-assigned IP.",domains:["net", "secplus"]},
  {a:"NIST",f:"National Institute of Standards and Technology",d:"US agency that publishes widely adopted cybersecurity frameworks including the CSF and SP 800 series.",c:"compliance",why:"Publishes the frameworks (CSF, 800-53) that much of the industry and US government build their programs on.",ex:"Using the NIST Cybersecurity Framework's Identify-Protect-Detect-Respond-Recover to structure a program.",domains:["grc", "compliance", "secplus"]},
  {a:"NIDS",f:"Network Intrusion Detection System",d:"Monitors entire network traffic for threats, unlike host-based IDS.",c:"operations"},
  {a:"NTP",f:"Network Time Protocol",d:"Protocol for synchronizing clocks across networked devices — critical for log correlation.",c:"protocol"},
  {a:"OAUTH",f:"Open Authorization",d:"Open standard protocol for token-based authorization and delegated access.",c:"identity",why:"Lets apps access data on your behalf without ever seeing your password. Most delegated access on the web runs on it.",ex:"Granting a third-party app access to your Google Calendar via a consent screen.",domains:["iam"]},
  {a:"OSINT",f:"Open Source Intelligence",d:"Intelligence gathered from publicly available sources to support security investigations.",c:"operations",why:"Turns publicly available data into intelligence. Attackers use it for recon, defenders for investigation.",ex:"Using Shodan to find an organization's internet-exposed services before an attacker does.",domains:["ti", "soc"],tools:["Maltego", "Shodan", "theHarvester"]},
  {a:"OWASP",f:"Open Web Application Security Project",d:"Nonprofit providing free resources on web application security, including the famous Top 10 list.",c:"compliance"},
  {a:"PAM",f:"Privileged Access Management",d:"Tools and processes for securing, managing, and monitoring privileged accounts.",c:"identity",why:"Secures the most dangerous accounts, the admin and service accounts attackers want most.",ex:"CyberArk vaulting a domain-admin password and rotating it after each checkout.",domains:["iam"],roles:["IAM Engineer", "PAM Administrator"],tools:["CyberArk", "BeyondTrust", "Delinea"]},
  {a:"PCI DSS",f:"Payment Card Industry Data Security Standard",d:"Security standards for organizations handling credit card data.",c:"compliance",why:"The mandatory standard for anyone handling card data. Failing it can cut off a business's ability to take payments.",ex:"Segmenting and encrypting the network zone where credit-card numbers are processed.",domains:["compliance", "grc"]},
  {a:"PGP",f:"Pretty Good Privacy",d:"Encryption program providing cryptographic privacy and authentication for data communications.",c:"crypto",why:"Brought public-key encryption to everyday email and files.",ex:"Encrypting a message so only the recipient's private key can open it.",domains:["secplus"]},
  {a:"PHI",f:"Protected Health Information",d:"Individually identifiable health information protected under HIPAA.",c:"compliance"},
  {a:"PII",f:"Personally Identifiable Information",d:"Data that could be used to identify a specific individual, such as SSN, email, or biometrics.",c:"compliance"},
  {a:"PKI",f:"Public Key Infrastructure",d:"System of roles, policies, and procedures for creating, managing, and distributing digital certificates.",c:"crypto",why:"The system of keys, certificates, and authorities that makes encryption and digital identity trustworthy at scale.",ex:"A Certificate Authority issuing the TLS certificate that proves a website is who it claims to be.",domains:["secplus"],roles:["PKI Engineer", "Security Engineer"]},
  {a:"POC",f:"Proof of Concept",d:"In security, code or demonstration proving a vulnerability is exploitable.",c:"threat"},
  {a:"RBA",f:"Risk-Based Authentication",d:"Dynamically adjusts authentication requirements based on context and risk score.",c:"identity",why:"Adjusts how much authentication it demands based on the risk of the request.",ex:"Prompting for MFA only when you log in from a new country or device.",domains:["iam"]},
  {a:"RBAC",f:"Role-Based Access Control",d:"Restricts system access based on a user's organizational role.",c:"identity",why:"Scales access by tying permissions to job roles instead of individuals. That makes access easier to audit and least-privilege by default.",ex:"All 'SOC Analyst' role members automatically inherit read access to the SIEM.",domains:["iam", "secplus"]},
  {a:"RDP",f:"Remote Desktop Protocol",d:"Microsoft protocol enabling remote GUI access to a Windows system — frequent attack target.",c:"protocol"},
  {a:"RFC",f:"Request for Comments",d:"Published standards and protocols from the IETF defining internet specifications.",c:"protocol"},
  {a:"RTO",f:"Recovery Time Objective",d:"Maximum acceptable downtime after a disaster before business impact becomes unacceptable.",c:"operations"},
  {a:"RPO",f:"Recovery Point Objective",d:"Maximum acceptable amount of data loss measured in time during a recovery scenario.",c:"operations"},
  {a:"SAML",f:"Security Assertion Markup Language",d:"XML-based standard for exchanging authentication and authorization data between parties.",c:"identity",why:"The XML standard that makes enterprise SSO work between an identity provider and apps.",ex:"An Okta IdP issuing a SAML assertion so an employee can reach Salesforce without a second login.",domains:["iam"],tools:["Okta", "Microsoft Entra ID", "Ping Identity"]},
  {a:"SCAP",f:"Security Content Automation Protocol",d:"NIST specification for standardizing security configuration checks and vulnerability reporting.",c:"compliance"},
  {a:"SIEM",f:"Security Information and Event Management",d:"Platform that aggregates, correlates, and analyzes security event data across an environment.",c:"operations",why:"Correlates logs from across the whole estate to surface attacks no single tool can see. It's the heart of most SOCs.",ex:"Splunk, Microsoft Sentinel, and Elastic Security are common SIEM platforms.",domains:["soc", "ti", "secplus"],roles:["SOC Analyst", "Detection Engineer", "Security Engineer"],tools:["Splunk", "Microsoft Sentinel", "Elastic Security"],iq:"What is the difference between a SIEM and an EDR?",ia:"A SIEM aggregates and correlates logs from many systems for broad, organization-wide visibility. An EDR focuses on detecting and responding to threats on individual endpoints. They're complementary, and a SIEM often ingests EDR alerts as one of its data sources."},
  {a:"SMTP",f:"Simple Mail Transfer Protocol",d:"Protocol for sending email across networks.",c:"protocol"},
  {a:"SNMP",f:"Simple Network Management Protocol",d:"Protocol for collecting and organizing information about managed network devices.",c:"protocol"},
  {a:"SOC",f:"Security Operations Center",d:"Centralized team monitoring and responding to cybersecurity threats around the clock.",c:"operations",why:"The team that monitors, detects, and responds to threats around the clock. It's where most cyber careers start.",ex:"A tiered SOC: Tier 1 triages alerts, Tier 2 investigates, Tier 3 hunts and handles major incidents.",domains:["soc", "secplus"],roles:["SOC Analyst (Tier 1-3)", "SOC Manager", "Detection Engineer"],tools:["SIEM", "SOAR", "EDR"]},
  {a:"SOAR",f:"Security Orchestration, Automation, and Response",d:"Platforms that automate security workflows and streamline incident response.",c:"operations",why:"Automates repetitive SOC work like enrichment, ticketing, and containment, so analysts spend their time on real decisions instead of toil.",ex:"A playbook that auto-isolates a host and opens a ticket the moment EDR flags ransomware behavior.",domains:["soc"],roles:["SOC Analyst", "Automation Engineer"],tools:["Splunk SOAR", "Cortex XSOAR", "Tines"]},
  {a:"SOX",f:"Sarbanes-Oxley Act",d:"US law requiring accurate financial reporting and internal controls — affects IT audit and compliance.",c:"compliance"},
  {a:"SPF",f:"Sender Policy Framework",d:"Email authentication method specifying which mail servers can send on behalf of a domain.",c:"protocol"},
  {a:"SQL",f:"Structured Query Language",d:"Language for managing databases — SQL injection is one of the most common web vulnerabilities.",c:"threat"},
  {a:"SSH",f:"Secure Shell",d:"Cryptographic protocol for secure remote login and command execution over an unsecured network.",c:"protocol"},
  {a:"SSL",f:"Secure Sockets Layer",d:"Predecessor to TLS — deprecated but the term is still commonly used to mean TLS.",c:"crypto",legacy:"Replaced by TLS. Every SSL version is deprecated and unsafe; people say 'SSL' but usually mean TLS.",domains:["net", "secplus"]},
  {a:"SSO",f:"Single Sign-On",d:"Authentication scheme allowing users to log in once and access multiple applications.",c:"identity",why:"Lets users authenticate once and reach many apps. That improves security (fewer passwords) and the user experience at the same time.",ex:"Logging into Gmail, Slack, and Zoom through one corporate Okta or Entra ID login.",domains:["iam", "secplus"],roles:["Identity Engineer", "IAM Analyst"],tools:["Okta", "Microsoft Entra ID", "Ping Identity"]},
  {a:"STIG",f:"Security Technical Implementation Guide",d:"DISA configuration standards for securing DoD IT systems.",c:"compliance"},
  {a:"SWG",f:"Secure Web Gateway",d:"Security solution that filters internet traffic to enforce acceptable use and protect against threats.",c:"network",why:"Filters and inspects outbound web traffic to block malware and enforce policy.",ex:"A Secure Web Gateway stopping employees from reaching known-malicious sites.",domains:["net", "secplus"]},
  {a:"TCP",f:"Transmission Control Protocol",d:"Core internet protocol ensuring reliable, ordered, error-checked delivery of data packets.",c:"protocol",why:"The reliable, ordered transport behind web, email, and file transfer. It guarantees delivery with handshakes and retransmission.",ex:"The three-way handshake (SYN, SYN-ACK, ACK) that starts every web page load.",domains:["net", "secplus"],iq:"What is the difference between TCP and UDP?",ia:"TCP is connection-oriented and reliable. It sets up a session with a three-way handshake, guarantees ordered delivery, and retransmits lost packets, which makes it ideal for web, email, and file transfer. UDP is connectionless and best-effort, with no handshake or delivery guarantees. That makes it faster and better suited to streaming, DNS, and VoIP, where speed matters more than perfect delivery."},
  {a:"TLS",f:"Transport Layer Security",d:"Cryptographic protocol securing communications over a network — the current standard replacing SSL.",c:"crypto",why:"Encrypts data in transit and authenticates servers. It's the 's' in HTTPS and what makes web trust work.",ex:"The padlock in your browser: TLS securing the connection between you and your bank.",domains:["net", "secplus"]},
  {a:"TTPs",f:"Tactics, Techniques, and Procedures",d:"Description of how threat actors operate, used to characterize and attribute cyberattacks.",c:"threat"},
  {a:"UAT",f:"User Acceptance Testing",d:"Final testing phase ensuring software meets requirements before deployment.",c:"operations"},
  {a:"UDP",f:"User Datagram Protocol",d:"Connectionless transport protocol offering speed over reliability — used in video streaming, DNS.",c:"protocol"},
  {a:"UEM",f:"Unified Endpoint Management",d:"Single platform to manage all endpoints including desktops, mobile, and IoT.",c:"infra"},
  {a:"URL",f:"Uniform Resource Locator",d:"Web address specifying the location of a resource on the internet.",c:"protocol"},
  {a:"UTM",f:"Unified Threat Management",d:"All-in-one security appliance combining firewall, IDS/IPS, antivirus, and more.",c:"network",why:"Bundles several security functions like firewall, IPS, antivirus, and web filtering into one appliance.",ex:"A small office running firewall, IPS, and content filtering on a single UTM box.",domains:["net", "secplus"]},
  {a:"VPN",f:"Virtual Private Network",d:"Encrypted tunnel that secures internet traffic and masks user IP addresses.",c:"network",why:"Encrypts traffic over untrusted networks so remote users reach internal resources securely.",ex:"A remote employee tunneling into the corporate network from a coffee-shop Wi-Fi.",domains:["net", "secplus"]},
  {a:"WAF",f:"Web Application Firewall",d:"Filters and monitors HTTP traffic between a web app and the internet to block attacks.",c:"network",why:"Shields web apps from common attacks like SQL injection and XSS at the HTTP layer.",ex:"Cloudflare or AWS WAF filtering a request that tries to inject SQL into a login form.",domains:["net", "cloud", "secplus"],tools:["Cloudflare", "AWS WAF", "F5"]},
  {a:"XDR",f:"Extended Detection and Response",d:"Unified security platform integrating multiple tools to detect and respond to threats across layers.",c:"operations",why:"Unifies detection across endpoint, network, email, and cloud so analysts see one correlated story, not siloed alerts.",ex:"Linking a phishing email, the endpoint it landed on, and the lateral movement that followed into one incident.",domains:["soc", "ti"],tools:["Palo Alto Cortex XDR", "CrowdStrike", "Microsoft Defender XDR"]},
  {a:"XSS",f:"Cross-Site Scripting",d:"Injection attack where malicious scripts are embedded into trusted web pages viewed by other users.",c:"threat"},
  {a:"ZTNA",f:"Zero Trust Network Access",d:"Security model requiring strict identity verification for every user and device, regardless of location.",c:"network",why:"Replaces a VPN's implicit trust with per-request verification. The model is 'never trust, always verify' for remote access.",ex:"Zscaler or Cloudflare Access granting a contractor one specific app, not the whole network.",domains:["net", "cloud", "secplus"],tools:["Zscaler", "Cloudflare Access", "Netskope"]},
  {a:"ZAP",f:"Zed Attack Proxy",d:"OWASP open-source tool for finding security vulnerabilities in web applications.",c:"threat"},
  {a:"RSA",f:"Rivest-Shamir-Adleman",d:"Widely used public-key encryption algorithm for securing data transmission and digital signatures.",c:"crypto",why:"The classic public-key algorithm for both encryption and digital signatures.",ex:"An RSA key signing a software release so users can verify it.",domains:["secplus"]},
  {a:"DSA",f:"Digital Signature Algorithm",d:"NIST standard algorithm for generating and verifying digital signatures.",c:"crypto",why:"A public-key algorithm built only for digital signatures, not encryption.",ex:"Signing a file to prove who sent it.",domains:["secplus"]},
  {a:"ECDSA",f:"Elliptic Curve Digital Signature Algorithm",d:"Variant of DSA using elliptic curve cryptography — smaller key sizes with equivalent strength.",c:"crypto",why:"Elliptic-curve signatures that match RSA's strength with much smaller keys.",ex:"256-bit ECDSA certificates securing modern HTTPS.",domains:["secplus"]},
  {a:"ECDH",f:"Elliptic Curve Diffie-Hellman",d:"Key exchange protocol using elliptic curve math to establish a shared secret over a public channel.",c:"crypto",why:"Elliptic-curve key exchange: two parties agree on a shared secret over an open line.",domains:["secplus"]},
  {a:"DH",f:"Diffie-Hellman",d:"Original key exchange protocol allowing two parties to establish a shared secret without prior contact.",c:"crypto",why:"The original way two parties derive a shared secret without sending it. Modern setups prefer the ephemeral elliptic-curve version.",domains:["secplus"]},
  {a:"SHA",f:"Secure Hash Algorithm",d:"Family of cryptographic hash functions (SHA-1, SHA-256, SHA-512) used for data integrity and digital signatures.",c:"crypto",why:"The standard hash family for integrity and signatures. SHA-2 and SHA-3 are current; SHA-1 is retired.",ex:"Checking a download's SHA-256 against the published value.",domains:["secplus"]},
  {a:"AES-256",f:"Advanced Encryption Standard 256-bit",d:"AES using a 256-bit key — the strongest AES variant, used where maximum encryption strength is required.",c:"crypto",why:"AES with a 256-bit key, the strongest standard symmetric setting.",ex:"Full-disk encryption with AES-256.",domains:["secplus"]},
  {a:"ECC",f:"Elliptic Curve Cryptography",d:"Public-key cryptography using elliptic curves — smaller keys and faster performance than RSA.",c:"crypto",why:"Cryptography on elliptic curves: RSA-level security with smaller, faster keys, good for mobile and IoT.",domains:["secplus"]},
  {a:"ECDHE",f:"Elliptic Curve Diffie-Hellman Ephemeral",d:"Key exchange using elliptic curves with ephemeral keys, providing perfect forward secrecy.",c:"crypto",why:"The ephemeral elliptic-curve key exchange in modern TLS. A fresh secret per session gives forward secrecy.",domains:["net", "secplus"]},
  {a:"DHE",f:"Diffie-Hellman Ephemeral",d:"Diffie-Hellman key exchange using temporary keys — enables perfect forward secrecy.",c:"crypto",why:"Ephemeral Diffie-Hellman. A new key each session keeps past traffic safe if a long-term key later leaks.",domains:["secplus"]},
  {a:"PFS",f:"Perfect Forward Secrecy",d:"Cryptographic property ensuring session keys are not compromised even if long-term keys are later exposed.",c:"crypto",why:"Compromising one session key, or even the server's long-term key, can't unlock past sessions.",ex:"TLS with ECDHE so yesterday's traffic stays private.",domains:["secplus"]},
  {a:"HMAC",f:"Hashed Message Authentication Code",d:"Uses a cryptographic hash and secret key to verify data integrity and authenticity.",c:"crypto",why:"Mixes a hash with a secret key to prove a message's integrity and where it came from.",ex:"Signing an API request with HMAC-SHA256.",domains:["secplus"]},
  {a:"CRL",f:"Certificate Revocation List",d:"List published by a CA of certificates that have been revoked before their expiration date.",c:"crypto",why:"A published list of revoked certificates so clients can reject ones that were compromised.",domains:["secplus"]},
  {a:"OCSP",f:"Online Certificate Status Protocol",d:"Real-time protocol for checking whether a digital certificate has been revoked.",c:"crypto",why:"A faster alternative to CRLs: clients check a single certificate's status in real time.",domains:["secplus"]},
  {a:"CSR",f:"Certificate Signing Request",d:"Encoded message sent to a CA to apply for a digital certificate, containing the public key and identity info.",c:"crypto",why:"The request you send a CA to get a certificate. It carries your public key and identity.",ex:"Generating a CSR on a web server before obtaining a TLS cert.",domains:["secplus"]},
  {a:"TPM",f:"Trusted Platform Module",d:"Dedicated microcontroller on a motherboard that stores cryptographic keys and enables hardware-based security.",c:"crypto",why:"A secure chip that stores keys and checks boot integrity, underpinning disk encryption and secure boot.",ex:"BitLocker tying its key to the TPM and a known-good boot.",domains:["secplus"]},
  {a:"DES",f:"Data Encryption Standard",d:"Older symmetric-key encryption algorithm — considered insecure today, replaced by AES.",c:"crypto",legacy:"Its 56-bit key falls to brute force in hours. Replaced by AES (and 3DES, now also retired).",domains:["secplus"]},
  {a:"RC4",f:"Rivest Cipher 4",d:"Stream cipher once widely used in SSL/WEP — now considered cryptographically broken.",c:"crypto",legacy:"A stream cipher with fatal weaknesses. Banned from TLS and replaced by AES-GCM and ChaCha20.",domains:["secplus"]},
  {a:"MD5",f:"Message Digest 5",d:"Widely used hash function producing a 128-bit hash — considered broken for security purposes.",c:"crypto",legacy:"Collisions make it unsafe for security. Use SHA-256. Fine only for non-security checksums.",domains:["secplus"]},
  {a:"PBKDF2",f:"Password-based Key Derivation Function 2",d:"Applies a pseudorandom function to a password with a salt to produce a derived key, slowing brute-force attacks.",c:"crypto",why:"Turns a password into a key slowly and with a salt, so brute-forcing it is expensive.",ex:"Storing passwords with PBKDF2, bcrypt, or Argon2.",domains:["secplus"]},
  {a:"S/MIME",f:"Secure/Multipurpose Internet Mail Extensions",d:"Standard for public-key encryption and signing of email messages.",c:"crypto",why:"A standard for signing and encrypting email with certificates.",ex:"Outlook signing mail so recipients can verify the sender.",domains:["secplus"]},
  {a:"RADIUS",f:"Remote Authentication Dial-in User Service",d:"Networking protocol providing centralized authentication, authorization, and accounting for network access.",c:"identity",why:"A protocol that centralizes authentication for network access like Wi-Fi, VPN, and switches.",ex:"Corporate Wi-Fi checking your credentials against a RADIUS server.",domains:["iam", "net", "secplus"]},
  {a:"TACACS+",f:"Terminal Access Controller Access Control System Plus",d:"Cisco-developed protocol providing granular AAA services, separating authentication from authorization.",c:"identity",why:"A Cisco AAA protocol that separates authentication, authorization, and accounting, often for device admin.",ex:"Controlling who can run which commands on routers through TACACS+.",domains:["iam", "net"]},
  {a:"CHAP",f:"Challenge Handshake Authentication Protocol",d:"Authentication protocol that verifies identity using a three-way handshake without sending the password over the wire.",c:"identity",why:"Authenticates without sending the password, using a challenge and a hashed response.",ex:"A PPP link verifying a peer with CHAP instead of cleartext.",domains:["iam"]},
  {a:"PEAP",f:"Protected Extensible Authentication Protocol",d:"Encapsulates EAP inside a TLS tunnel to protect authentication credentials.",c:"identity",why:"Wraps EAP authentication inside a TLS tunnel to protect credentials on wireless networks.",ex:"Enterprise Wi-Fi using PEAP so passwords aren't exposed over the air.",domains:["iam", "net"]},
  {a:"HOTP",f:"HMAC-based One-time Password",d:"One-time password algorithm using HMAC and an incrementing counter — used in hardware tokens.",c:"identity",why:"A one-time password based on a counter that increments with each use.",ex:"A hardware token generating the next HOTP code on every button press.",domains:["iam"]},
  {a:"TOTP",f:"Time-based One-time Password",d:"One-time password algorithm using the current time as the counter — used in authenticator apps.",c:"identity",why:"A one-time password that changes every 30 seconds, the basis of most authenticator apps.",ex:"Google Authenticator showing a rotating TOTP code for MFA.",domains:["iam", "secplus"]},
  {a:"PIV",f:"Personal Identity Verification",d:"US federal smart card standard used for employee authentication to facilities and systems.",c:"identity",why:"A US federal smart-card standard for proving identity to facilities and systems.",ex:"A federal employee tapping a PIV card to log into a workstation.",domains:["iam"]},
  {a:"IdP",f:"Identity Provider",d:"System that creates, maintains, and manages identity information and provides authentication services.",c:"identity",why:"The service that authenticates users and vouches for them to other apps in SSO.",ex:"Okta acting as the IdP that logs you into every connected SaaS app.",domains:["iam", "secplus"]},
  {a:"DAC",f:"Discretionary Access Control",d:"Access control model where the resource owner decides who can access their resources.",c:"identity",why:"Access control where the resource owner decides who gets in, the model behind normal file permissions.",ex:"A user sharing their own document and choosing who can edit it.",domains:["iam", "secplus"]},
  {a:"ABAC",f:"Attribute-based Access Control",d:"Access control model granting permissions based on attributes of users, resources, and environment.",c:"identity",why:"Grants access from attributes like role, department, location, and time, not just fixed roles.",ex:"Allowing a file only to finance staff on a managed device during work hours.",domains:["iam"]},
  {a:"MDM",f:"Mobile Device Management",d:"Software for managing, monitoring, and securing employee mobile devices deployed across an organization.",c:"identity",why:"Manages and secures a fleet of phones and laptops, enforcing encryption, policy, and remote wipe.",ex:"Microsoft Intune pushing a passcode policy and remotely wiping a lost company phone.",domains:["cloud", "secplus"],tools:["Microsoft Intune", "Jamf", "VMware Workspace ONE"]},
  {a:"DHCP",f:"Dynamic Host Configuration Protocol",d:"Network protocol that automatically assigns IP addresses and other network configuration to devices.",c:"protocol"},
  {a:"ICMP",f:"Internet Control Message Protocol",d:"Used by network devices to send error messages and operational information — basis of ping and traceroute.",c:"protocol"},
  {a:"BGP",f:"Border Gateway Protocol",d:"Routing protocol that manages how data is routed between autonomous systems on the internet.",c:"protocol"},
  {a:"OSPF",f:"Open Shortest Path First",d:"Link-state routing protocol used within a single autonomous system to find the best network path.",c:"protocol"},
  {a:"GRE",f:"Generic Routing Encapsulation",d:"Tunneling protocol that encapsulates a wide variety of network layer protocols inside virtual point-to-point links.",c:"protocol"},
  {a:"L2TP",f:"Layer 2 Tunneling Protocol",d:"Tunneling protocol used to support VPNs — typically paired with IPSec for encryption.",c:"protocol"},
  {a:"SFTP",f:"SSH File Transfer Protocol",d:"Extension of SSH providing encrypted file transfer over a secure channel.",c:"protocol"},
  {a:"DKIM",f:"DomainKeys Identified Mail",d:"Email authentication method that adds a digital signature to outgoing messages to verify sender legitimacy.",c:"protocol"},
  {a:"DMARC",f:"Domain-based Message Authentication Reporting and Conformance",d:"Email authentication policy building on SPF and DKIM to protect domains from spoofing.",c:"protocol"},
  {a:"IMAP",f:"Internet Message Access Protocol",d:"Protocol for retrieving email that keeps messages on the server and allows access from multiple devices.",c:"protocol"},
  {a:"SMTPS",f:"Simple Mail Transfer Protocol Secure",d:"SMTP over TLS/SSL, encrypting email in transit between mail servers.",c:"protocol"},
  {a:"NGFW",f:"Next-generation Firewall",d:"Advanced firewall with deep packet inspection, intrusion prevention, and application awareness beyond port/protocol.",c:"network",why:"A firewall that inspects traffic at the application layer, not just ports, with built-in IPS and app awareness.",ex:"Blocking an app like BitTorrent no matter which port it tries to use.",domains:["net", "secplus"]},
  {a:"VLAN",f:"Virtual Local Area Network",d:"Logical segmentation of a network grouping devices regardless of physical location.",c:"network",why:"Splits one physical switch into separate logical networks, segmenting traffic for security and order.",ex:"Putting guest Wi-Fi on its own VLAN so it can't reach internal servers.",domains:["net", "secplus"]},
  {a:"SD-WAN",f:"Software-defined Wide Area Network",d:"Uses software to control connectivity and services between data centers and remote sites.",c:"network",why:"Manages and routes WAN traffic in software, often cheaper and more flexible than dedicated MPLS links.",ex:"Routing branch traffic over broadband with SD-WAN instead of leased lines.",domains:["net", "cloud"]},
  {a:"SASE",f:"Secure Access Service Edge",d:"Cloud architecture combining WAN capabilities with security functions like CASB and ZTNA.",c:"network",why:"Converges networking and security into one cloud-delivered service for the distributed, work-from-anywhere era.",ex:"Zscaler or Palo Alto Prisma routing and securing all branch and remote traffic through the cloud.",domains:["cloud", "net"],tools:["Zscaler", "Palo Alto Prisma", "Cato Networks"]},
  {a:"WIDS",f:"Wireless Intrusion Detection System",d:"Monitors wireless network traffic for suspicious activity and unauthorized access points.",c:"network",why:"Monitors wireless airspace for rogue access points and suspicious activity.",ex:"Detecting an attacker's evil-twin AP impersonating the corporate SSID.",domains:["net"]},
  {a:"WIPS",f:"Wireless Intrusion Prevention System",d:"Actively monitors and blocks threats on wireless networks, including rogue access points.",c:"network",why:"The active version of a WIDS, automatically blocking or containing rogue wireless devices.",ex:"Auto-deauthenticating a rogue access point the moment it appears.",domains:["net"]},
  {a:"SQLi",f:"SQL Injection",d:"Attack inserting malicious SQL code into a query to manipulate or extract database data.",c:"threat"},
  {a:"CSRF",f:"Cross-site Request Forgery",d:"Attack tricking an authenticated user into unknowingly submitting a malicious request.",c:"threat"},
  {a:"ASLR",f:"Address Space Layout Randomization",d:"Security technique randomizing memory address locations to make exploitation significantly harder.",c:"threat"},
  {a:"RAT",f:"Remote Access Trojan",d:"Malware giving an attacker covert remote control over an infected system.",c:"threat"},
  {a:"STIX",f:"Structured Threat Information eXchange",d:"Standardized language for sharing cyber threat intelligence in a consistent, machine-readable format.",c:"threat"},
  {a:"TAXII",f:"Trusted Automated eXchange of Indicator Information",d:"Protocol used to exchange STIX cyber threat intelligence over HTTPS.",c:"threat"},
  {a:"AIS",f:"Automated Indicator Sharing",d:"CISA program enabling real-time exchange of machine-readable cyber threat indicators.",c:"threat"},
  {a:"GDPR",f:"General Data Protection Regulation",d:"EU regulation governing collection, storage, and processing of personal data of EU residents.",c:"compliance"},
  {a:"BCP",f:"Business Continuity Planning",d:"Processes ensuring critical business functions continue during and after a disaster.",c:"compliance"},
  {a:"DRP",f:"Disaster Recovery Plan",d:"Documented process for recovering IT systems and data after a catastrophic event.",c:"compliance"},
  {a:"BIA",f:"Business Impact Analysis",d:"Process identifying critical business functions and the impact of disrupting them.",c:"compliance"},
  {a:"AUP",f:"Acceptable Use Policy",d:"Policy defining the acceptable ways employees may use company IT resources.",c:"compliance"},
  {a:"NDA",f:"Non-disclosure Agreement",d:"Legal contract preventing parties from sharing confidential information with third parties.",c:"compliance"},
  {a:"SLA",f:"Service-level Agreement",d:"Contract defining expected service levels, uptime guarantees, and remedies between provider and client.",c:"compliance"},
  {a:"MOU",f:"Memorandum of Understanding",d:"Non-binding agreement outlining intentions and expectations between two parties.",c:"compliance"},
  {a:"MOA",f:"Memorandum of Agreement",d:"Formal agreement between parties — more binding than an MOU, less than a full contract.",c:"compliance"},
  {a:"SDLC",f:"Software Development Lifecycle",d:"Structured process for planning, creating, testing, and deploying software securely.",c:"compliance"},
  {a:"MTBF",f:"Mean Time Between Failures",d:"Average operating time between system failures — used to assess hardware reliability.",c:"compliance"},
  {a:"SLE",f:"Single Loss Expectancy",d:"Dollar value expected from a single security incident — core to quantitative risk analysis.",c:"compliance"},
  {a:"ALE",f:"Annualized Loss Expectancy",d:"Expected annual financial loss from a threat: SLE multiplied by the annualized rate of occurrence.",c:"compliance"},
  {a:"ARO",f:"Annualized Rate of Occurrence",d:"Estimated frequency that a threat event is expected to occur within a year.",c:"compliance"},
  {a:"IRP",f:"Incident Response Plan",d:"Documented procedures for detecting, responding to, and recovering from security incidents.",c:"operations"},
  {a:"CIRT",f:"Computer Incident Response Team",d:"Group responsible for responding to and managing cybersecurity incidents.",c:"operations"},
  {a:"CERT",f:"Computer Emergency Response Team",d:"Team handling cybersecurity incidents and coordinating responses — often used interchangeably with CIRT.",c:"operations"},
  {a:"API",f:"Application Programming Interface",d:"Set of rules allowing software applications to communicate — commonly targeted in injection and auth attacks.",c:"operations"},
  {a:"PCAP",f:"Packet Capture",d:"Recording of network packets for analysis — essential tool in incident investigation and forensics.",c:"operations"},
  {a:"HIPS",f:"Host-based Intrusion Prevention System",d:"Security software on an endpoint that monitors and actively blocks malicious activity in real time.",c:"operations"},
  {a:"NIPS",f:"Network-based Intrusion Prevention System",d:"Inline network device that inspects traffic and actively blocks detected threats.",c:"operations"},
  {a:"IaaS",f:"Infrastructure as a Service",d:"Cloud model where the provider manages virtualized computing resources — customer manages OS and above.",c:"infra",why:"Renting raw compute and storage in the cloud. You secure everything above the hypervisor, which is the shared-responsibility line.",ex:"Running and hardening your own VMs and networks on AWS EC2 or Azure VMs.",domains:["cloud", "secplus"]},
  {a:"PaaS",f:"Platform as a Service",d:"Cloud model providing a platform for developers to build apps without managing underlying infrastructure.",c:"infra",why:"A managed platform to build on. The provider secures the OS and runtime; you secure your app and data.",ex:"Deploying code to Azure App Service or Heroku without managing the underlying servers.",domains:["cloud", "secplus"]},
  {a:"SaaS",f:"Software as a Service",d:"Cloud model delivering software over the internet — provider manages everything, user just uses the app.",c:"infra",why:"Ready-to-use cloud software where you mainly secure access and data. It's the model behind most business apps today.",ex:"Using Microsoft 365 or Salesforce, where your job is identity, sharing, and config, not servers.",domains:["cloud", "secplus"]},
  {a:"CSP",f:"Cloud Service Provider",d:"Company offering cloud computing services including storage, servers, and software.",c:"infra"},
  {a:"VPC",f:"Virtual Private Cloud",d:"Isolated cloud environment within a public cloud, providing dedicated resources and network controls.",c:"infra",why:"Your private, isolated network inside a public cloud. It's the boundary you segment and control.",ex:"An AWS VPC with public and private subnets separating web servers from databases.",domains:["cloud"]},
  {a:"SDN",f:"Software-defined Networking",d:"Network architecture separating the control plane from the data plane, managed via software.",c:"infra"},
  {a:"SCADA",f:"Supervisory Control and Data Acquisition",d:"Industrial control system used to monitor and control physical infrastructure like power grids and pipelines.",c:"infra"},
  {a:"ICS",f:"Industrial Control Systems",d:"Systems managing industrial operations — critical infrastructure targets including SCADA and PLCs.",c:"infra"},
  {a:"RTOS",f:"Real-time Operating System",d:"OS designed for real-time applications requiring precise, time-bound processing — common in embedded/ICS.",c:"infra"},
  {a:"FPGA",f:"Field Programmable Gate Array",d:"Reconfigurable integrated circuit that can be programmed after manufacturing — used in specialized security hardware.",c:"infra"},
  {a:"VDI",f:"Virtual Desktop Infrastructure",d:"Hosts desktop environments on a centralized server streamed to end users — easier to secure and patch.",c:"infra"},
  {a:"UPS",f:"Uninterruptible Power Supply",d:"Battery backup system providing emergency power to prevent data loss and downtime during outages.",c:"infra"},
  {a:"AH",f:"Authentication Header",d:"IPSec protocol that provides data integrity and authentication for IP packets but does not encrypt the payload.",c:"crypto",why:"The IPSec piece that authenticates packets for integrity but does not encrypt them.",domains:["net"]},
  {a:"AI",f:"Artificial Intelligence",d:"Machine learning-based systems used in cybersecurity for threat detection, anomaly analysis, and automated response.",c:"infra"},
  {a:"AP",f:"Access Point",d:"Wireless networking device that allows Wi-Fi devices to connect to a wired network.",c:"network",why:"The device that bridges Wi-Fi clients onto the wired network, and a common target for spoofing.",ex:"Employees connecting laptops to the office wireless through an AP.",domains:["net"]},
  {a:"ATT&CK",f:"Adversarial Tactics, Techniques, and Common Knowledge",d:"MITRE framework documenting real-world adversary behaviors organized as a matrix of tactics and techniques.",c:"threat",why:"MITRE's knowledge base of real attacker tactics and techniques. It's the shared language for detection and threat intel.",ex:"Mapping a detection to technique T1059 (Command and Scripting Interpreter) in the ATT&CK matrix.",domains:["ti", "soc"],tools:["MITRE ATT&CK Navigator"]},
  {a:"AV",f:"Antivirus",d:"Software that detects and removes malware by scanning files and processes for known malicious signatures.",c:"operations"},
  {a:"BASH",f:"Bourne Again Shell",d:"Default Unix/Linux command-line shell commonly used in scripting, automation, and security tooling.",c:"operations"},
  {a:"BIOS",f:"Basic Input/Output System",d:"Firmware initializing hardware during boot — a target for rootkits and firmware attacks.",c:"infra"},
  {a:"BPA",f:"Business Partners Agreement",d:"Formal agreement between organizations defining security responsibilities when sharing data or systems.",c:"compliance"},
  {a:"BPDU",f:"Bridge Protocol Data Unit",d:"Message used by spanning tree protocol to prevent loops — BPDU guard protects against rogue switches.",c:"network",why:"The messages switches exchange to run Spanning Tree and prevent network loops.",ex:"BPDU Guard shutting a port when someone plugs in a rogue switch.",domains:["net"]},
  {a:"CAPTCHA",f:"Completely Automated Public Turing Test to Tell Computers and Humans Apart",d:"Challenge-response test used to block automated bots from accessing web services.",c:"threat"},
  {a:"CAR",f:"Corrective Action Report",d:"Formal document identifying a security problem and the steps taken to fix it.",c:"compliance"},
  {a:"CBC",f:"Cipher Block Chaining",d:"Block cipher mode where each block of plaintext is XORed with the previous ciphertext block before encryption.",c:"crypto",why:"A block-cipher mode where each block mixes with the previous one. Safe with a random IV, but needs care around padding.",domains:["secplus"]},
  {a:"CCMP",f:"Counter Mode/CBC-MAC Protocol",d:"Encryption protocol used in WPA2 based on AES — replaced the weaker TKIP.",c:"crypto",why:"The AES-based protocol that secures WPA2 Wi-Fi, replacing the broken TKIP.",domains:["net", "secplus"]},
  {a:"CCTV",f:"Closed-circuit Television",d:"Video surveillance system used as a physical security control to monitor and record activity.",c:"compliance"},
  {a:"CFB",f:"Cipher Feedback",d:"Block cipher mode that converts a block cipher into a stream cipher for continuous encryption.",c:"crypto",why:"A mode that turns a block cipher into a self-synchronizing stream cipher."},
  {a:"CIA",f:"Confidentiality, Integrity, and Availability",d:"The three core principles of information security — the foundation of all security controls.",c:"compliance"},
  {a:"CIO",f:"Chief Information Officer",d:"Executive responsible for an organization's IT strategy and infrastructure.",c:"compliance"},
  {a:"CMS",f:"Content Management System",d:"Platform for creating and managing digital content — commonly targeted due to plugin vulnerabilities.",c:"threat"},
  {a:"COOP",f:"Continuity of Operation Planning",d:"Government/organizational planning ensuring essential functions continue during emergencies.",c:"compliance"},
  {a:"COPE",f:"Corporate Owned Personally Enabled",d:"Mobile device policy where the organization owns devices but allows personal use.",c:"compliance"},
  {a:"CP",f:"Contingency Planning",d:"Process of preparing for unexpected disruptions to business operations.",c:"compliance"},
  {a:"CRC",f:"Cyclical Redundancy Check",d:"Error-detecting code used to verify data integrity during transmission — not a security control.",c:"protocol"},
  {a:"CSO",f:"Chief Security Officer",d:"Executive responsible for the physical and cybersecurity of an organization.",c:"compliance"},
  {a:"CTR",f:"Counter Mode",d:"Block cipher mode that turns a block cipher into a stream cipher using an incrementing counter.",c:"crypto",why:"A mode that turns a block cipher into a parallel stream cipher by encrypting a counter. It's the basis of GCM."},
  {a:"CTO",f:"Chief Technology Officer",d:"Executive responsible for technology strategy and innovation within an organization.",c:"compliance"},
  {a:"CYOD",f:"Choose Your Own Device",d:"Policy allowing employees to select from approved devices rather than using any personal device.",c:"compliance"},
  {a:"DBA",f:"Database Administrator",d:"Person responsible for managing and securing databases — key role in data protection.",c:"compliance"},
  {a:"DLL",f:"Dynamic Link Library",d:"Windows file containing reusable code — DLL injection is a common attack technique.",c:"threat"},
  {a:"DNAT",f:"Destination Network Address Translation",d:"Rewrites the destination IP of inbound packets — used in port forwarding and load balancing.",c:"network",why:"Rewrites the destination address of incoming packets to forward external traffic to an internal host.",ex:"Forwarding port 443 from a public IP to an internal web server.",domains:["net"]},
  {a:"DPO",f:"Data Privacy Officer",d:"Role required under GDPR responsible for overseeing data protection strategy and compliance.",c:"compliance"},
  {a:"DSL",f:"Digital Subscriber Line",d:"Broadband internet connection over telephone lines — relevant in network topology discussions.",c:"network",why:"Broadband over ordinary phone lines, an older but still-common last-mile connection.",ex:"A small office getting internet over DSL where fiber isn't available."},
  {a:"ECB",f:"Electronic Code Book",d:"Simplest block cipher mode that encrypts each block independently — considered insecure due to pattern leakage.",c:"crypto",why:"The simplest block mode, and the one to avoid: identical input blocks produce identical output, leaking patterns.",domains:["secplus"]},
  {a:"EFS",f:"Encrypted File System",d:"Windows feature allowing individual files and folders to be encrypted using the user's credentials.",c:"crypto",why:"Windows file-level encryption tied to a user account, protecting individual files at rest."},
  {a:"ERP",f:"Enterprise Resource Planning",d:"Integrated business software managing core processes — a high-value attack target.",c:"infra"},
  {a:"ESN",f:"Electronic Serial Number",d:"Unique identifier assigned to mobile devices — relevant in device tracking and authentication.",c:"identity",legacy:"An older mobile device identifier, replaced by the MEID and IMEI."},
  {a:"ESP",f:"Encapsulated Security Payload",d:"IPSec protocol that provides encryption, confidentiality, and optional authentication for IP packets.",c:"crypto",why:"The IPSec piece that actually encrypts the packet payload.",domains:["net"]},
  {a:"FACL",f:"File System Access Control List",d:"Extended ACL attached to individual files and directories controlling granular access permissions.",c:"identity",why:"Per-file access rules that extend the basic owner, group, and other permissions on a filesystem.",ex:"Granting one extra user write access to a file with a POSIX FACL."},
  {a:"FDE",f:"Full Disk Encryption",d:"Encryption of an entire drive so data is unreadable without proper authentication.",c:"crypto",why:"Encrypts a whole drive so its contents are unreadable without the key, the main defense for lost laptops.",domains:["secplus"]},
  {a:"FRR",f:"False Rejection Rate",d:"Biometric metric measuring how often a legitimate user is incorrectly denied access.",c:"identity",why:"How often a biometric system wrongly rejects a legitimate user. You tune it against the false acceptance rate.",ex:"A fingerprint reader set too strict, raising the FRR and frustrating staff.",domains:["iam"]},
  {a:"FTPS",f:"FTP Secure",d:"FTP over SSL/TLS providing encrypted file transfers — distinct from SFTP, which runs over SSH.",c:"protocol"},
  {a:"GCM",f:"Galois Counter Mode",d:"Authenticated encryption mode combining counter mode encryption with authentication — used in AES-GCM.",c:"crypto",why:"An authenticated mode giving confidentiality and integrity at once. AES-GCM is the modern default in TLS.",domains:["secplus"]},
  {a:"GPG",f:"GNU Privacy Guard",d:"Free open-source implementation of PGP for encrypting and signing data and communications.",c:"crypto",why:"The free, open implementation of OpenPGP for encrypting and signing.",ex:"Signing a release with GPG so users can check it.",domains:["secplus"]},
  {a:"GPO",f:"Group Policy Object",d:"Windows Active Directory feature for centrally managing security settings across systems.",c:"identity",why:"Windows policy objects that push settings and restrictions across a domain from Active Directory.",ex:"A GPO enforcing a screen-lock timeout on every domain PC.",domains:["iam", "secplus"]},
  {a:"GPS",f:"Global Positioning System",d:"Satellite navigation system — relevant in mobile security geofencing and location-based access controls.",c:"infra"},
  {a:"GPU",f:"Graphics Processing Unit",d:"Processor used for parallel computation — commonly used in password cracking and cryptomining attacks.",c:"threat"},
  {a:"HA",f:"High Availability",d:"System design ensuring continuous operation with minimal downtime through redundancy.",c:"infra"},
  {a:"HDD",f:"Hard Disk Drive",d:"Traditional magnetic storage device — relevant in data destruction, sanitization, and forensics.",c:"infra"},
  {a:"HTML",f:"Hypertext Markup Language",d:"Standard language for web pages — XSS attacks inject malicious scripts into HTML.",c:"threat"},
  {a:"HVAC",f:"Heating, Ventilation, and Air Conditioning",d:"Physical building systems — relevant to data center physical security and environmental controls.",c:"compliance"},
  {a:"IaC",f:"Infrastructure as Code",d:"Managing and provisioning infrastructure through code — misconfigurations can create security gaps.",c:"infra"},
  {a:"IDEA",f:"International Data Encryption Algorithm",d:"Symmetric-key block cipher — older algorithm largely replaced by AES.",c:"crypto",legacy:"Once used in early PGP. Superseded by AES and mostly of historical interest now."},
  {a:"IDF",f:"Intermediate Distribution Frame",d:"Wiring rack connecting building cabling to the main distribution frame — physical security consideration.",c:"network",why:"A wiring closet that connects a floor or area back to the building's main distribution frame.",ex:"Patch panels and switches for one floor living in its IDF."},
  {a:"IEEE",f:"Institute of Electrical and Electronics Engineers",d:"Standards body responsible for protocols like 802.11 Wi-Fi and 802.1X port authentication.",c:"protocol"},
  {a:"IKE",f:"Internet Key Exchange",d:"Protocol used to set up a security association in IPSec by negotiating keys and algorithms.",c:"crypto",why:"Negotiates the keys and settings that set up an IPSec tunnel.",domains:["net"]},
  {a:"IM",f:"Instant Messaging",d:"Real-time text communication — a vector for phishing, malware delivery, and data leakage.",c:"threat"},
  {a:"IR",f:"Incident Response",d:"Structured approach to handling and managing the aftermath of a security breach.",c:"operations"},
  {a:"IRC",f:"Internet Relay Chat",d:"Real-time chat protocol — historically used as a command-and-control channel for botnets.",c:"threat"},
  {a:"ISP",f:"Internet Service Provider",d:"Company providing internet access — relevant in upstream filtering, DDoS mitigation, and legal requests.",c:"network",why:"The company that provides your internet connection, and your first hop to everything online.",ex:"An office buying connectivity from an ISP like Comcast or AT&T.",domains:["net"]},
  {a:"ISSO",f:"Information Systems Security Officer",d:"Person responsible for the day-to-day security of a specific information system.",c:"compliance"},
  {a:"IV",f:"Initialization Vector",d:"Random value used with a key to encrypt data, ensuring identical plaintexts produce different ciphertext.",c:"crypto",why:"A random starting value so encrypting the same text twice gives different output.",domains:["secplus"]},
  {a:"KDC",f:"Key Distribution Center",d:"Component of Kerberos authentication that issues tickets for network service access.",c:"identity",why:"The Kerberos component that issues tickets so users authenticate without resending passwords.",ex:"Active Directory's KDC handing out a ticket after you log in.",domains:["iam"]},
  {a:"KEK",f:"Key Encryption Key",d:"Key used to encrypt other keys — protects keys at rest in key management systems.",c:"crypto",why:"A key whose only job is to encrypt other keys, which makes safe key storage and rotation possible."},
  {a:"LAN",f:"Local Area Network",d:"Network connecting devices within a limited area like a building or campus.",c:"network",why:"A network covering a single site like an office or home, where local devices talk directly.",ex:"All the machines in one office sharing a LAN.",domains:["net"]},
  {a:"LEAP",f:"Lightweight Extensible Authentication Protocol",d:"Cisco proprietary wireless auth protocol — considered weak and deprecated.",c:"protocol"},
  {a:"MAN",f:"Metropolitan Area Network",d:"Network spanning a city or large campus — larger than LAN, smaller than WAN.",c:"network",why:"A network spanning a city or campus, larger than a LAN but smaller than a WAN.",ex:"A university linking several campuses across a city with a MAN."},
  {a:"MBR",f:"Master Boot Record",d:"First sector of a storage device containing boot code — target for bootkits and destructive malware.",c:"threat"},
  {a:"MDF",f:"Main Distribution Frame",d:"Central wiring hub in a facility where external lines connect to internal cabling.",c:"network",why:"The central wiring point of a building, where external lines and the core network gear terminate.",ex:"The MDF where the ISP circuit enters and feeds every floor's IDF."},
  {a:"MFD",f:"Multifunction Device",d:"Office device combining printer, scanner, and fax — often overlooked attack surface on a network.",c:"infra"},
  {a:"MFP",f:"Multifunction Printer",d:"Printer with built-in scanning, copying, and faxing — stores documents internally and needs hardening.",c:"infra"},
  {a:"ML",f:"Machine Learning",d:"AI technique used in cybersecurity for anomaly detection, behavioral analysis, and threat classification.",c:"infra"},
  {a:"MMS",f:"Multimedia Message Service",d:"Mobile messaging standard supporting images and video — a vector for mobile-based attacks.",c:"threat"},
  {a:"MPLS",f:"Multi-protocol Label Switching",d:"High-performance routing technique directing data using short path labels — used in enterprise WANs.",c:"network",why:"Routes traffic along pre-set labeled paths for predictable performance, common in carrier WANs.",ex:"Linking offices over a private MPLS WAN with guaranteed bandwidth."},
  {a:"MSA",f:"Master Service Agreement",d:"Overarching contract between companies governing all future transactions and security responsibilities.",c:"compliance"},
  {a:"MSCHAP",f:"Microsoft Challenge Handshake Authentication Protocol",d:"Microsoft's version of CHAP used in Windows and VPN authentication.",c:"identity",legacy:"MS-CHAPv2 is cryptographically broken and can be cracked offline. Use certificate-based EAP-TLS instead.",domains:["iam", "net"]},
  {a:"MaaS",f:"Monitoring as a Service",d:"Cloud-based monitoring solution for infrastructure, applications, and security events.",c:"infra"},
  {a:"MTTF",f:"Mean Time to Failure",d:"Average time a non-repairable system or component operates before failing.",c:"compliance"},
  {a:"MTU",f:"Maximum Transmission Unit",d:"Largest packet size a network can transmit — manipulated in some fragmentation-based attacks.",c:"network",why:"The largest packet a link will carry. Mismatches cause fragmentation and odd slowdowns.",ex:"Lowering MTU to fix a VPN that keeps dropping large packets."},
  {a:"NFC",f:"Near Field Communication",d:"Short-range wireless communication used in contactless payments and access cards — vulnerable to eavesdropping.",c:"network",why:"Very short-range wireless for tap-to-pay and access badges. The short range limits but doesn't remove risk.",ex:"Tapping a phone to a reader for contactless payment over NFC.",domains:["net"]},
  {a:"NTFS",f:"New Technology File System",d:"Windows file system supporting permissions, encryption, and auditing via EFS and ACLs.",c:"infra"},
  {a:"NTLM",f:"New Technology LAN Manager",d:"Older Microsoft authentication protocol — vulnerable to pass-the-hash and relay attacks.",c:"identity",legacy:"Vulnerable to relay and pass-the-hash attacks. Microsoft is phasing it out in favor of Kerberos.",domains:["iam", "secplus"]},
  {a:"OID",f:"Object Identifier",d:"Unique numeric identifier used in digital certificates and SNMP to identify objects.",c:"protocol"},
  {a:"OS",f:"Operating System",d:"Software managing hardware and providing services — hardening the OS is a core security practice.",c:"infra"},
  {a:"OT",f:"Operational Technology",d:"Hardware and software monitoring and controlling physical devices in industrial environments.",c:"infra"},
  {a:"OTA",f:"Over the Air",d:"Wireless method of distributing firmware and software updates to mobile and IoT devices.",c:"infra"},
  {a:"OVAL",f:"Open Vulnerability Assessment Language",d:"XML-based standard for describing system security states and assessment results.",c:"compliance"},
  {a:"P12",f:"PKCS #12",d:"File format storing a private key and certificate chain — protected by a password.",c:"crypto",why:"A file format that bundles a certificate with its private key, used for import and export."},
  {a:"P2P",f:"Peer to Peer",d:"Decentralized network where devices communicate directly — used by some malware for C2 communications.",c:"threat"},
  {a:"PAC",f:"Proxy Auto Configuration",d:"Script that tells a browser which proxy server to use — can be hijacked in WPAD attacks.",c:"network",why:"A script that tells a browser which proxy to use for which sites.",ex:"A PAC file routing only internal URLs through the corporate proxy."},
  {a:"PAP",f:"Password Authentication Protocol",d:"Simple authentication protocol sending passwords in plaintext — considered insecure.",c:"identity",legacy:"Sends credentials in cleartext. Only safe inside an already-encrypted tunnel; CHAP and EAP replaced it.",domains:["iam"]},
  {a:"PAT",f:"Port Address Translation",d:"Maps multiple private IPs to a single public IP using different ports — extends NAT.",c:"network",why:"A form of NAT that multiplexes many internal hosts onto one public IP using port numbers.",ex:"Hundreds of office devices sharing one IP, separated by port with PAT.",domains:["net", "secplus"]},
  {a:"PBX",f:"Private Branch Exchange",d:"Internal telephone system — voice phishing and vishing attacks often target PBX systems.",c:"threat"},
  {a:"PDU",f:"Power Distribution Unit",d:"Device distributing electrical power in a data center — physical security and resilience consideration.",c:"infra"},
  {a:"PED",f:"Personal Electronic Device",d:"Any portable electronic device — relevant in BYOD policies and physical security controls.",c:"compliance"},
  {a:"PEM",f:"Privacy Enhanced Mail",d:"Base64-encoded certificate format commonly used for TLS certificates and private keys.",c:"crypto",why:"The common Base64 text format for certs and keys, the BEGIN CERTIFICATE files."},
  {a:"PKCS",f:"Public Key Cryptography Standards",d:"Set of RSA Security standards defining formats for cryptographic keys, certificates, and messages.",c:"crypto",why:"A family of standards for formatting keys, certificates, and signatures so tools interoperate."},
  {a:"POP",f:"Post Office Protocol",d:"Protocol for retrieving email from a server — downloads messages and typically removes them from server.",c:"protocol"},
  {a:"POTS",f:"Plain Old Telephone Service",d:"Traditional analog telephone network — relevant in legacy infrastructure and vishing attack context.",c:"network",why:"The traditional copper telephone network. Still used for fax machines, alarm panels, and backup lines.",ex:"An alarm system dialing out over a POTS line when the internet is down."},
  {a:"PPP",f:"Point-to-Point Protocol",d:"Data link protocol for direct connections between two nodes — used in dial-up and some VPN tunnels.",c:"protocol"},
  {a:"PPTP",f:"Point-to-Point Tunneling Protocol",d:"VPN protocol considered insecure due to weak encryption — largely replaced by L2TP/IPSec and OpenVPN.",c:"network",legacy:"An early VPN protocol with broken encryption (MS-CHAPv2). Replaced by IPSec, OpenVPN, and WireGuard.",domains:["net", "secplus"]},
  {a:"PSK",f:"Pre-shared Key",d:"Secret value shared between parties before communication — used in WPA2-Personal and IPSec.",c:"crypto",why:"A secret shared ahead of time. Simple but hard to scale; used in WPA2-Personal and some VPNs.",domains:["net", "secplus"]},
  {a:"PTZ",f:"Pan-Tilt-Zoom",d:"Type of surveillance camera with remote directional and zoom control — used in physical security.",c:"compliance"},
  {a:"PUP",f:"Potentially Unwanted Program",d:"Software installed without clear consent that may display ads, track usage, or degrade performance.",c:"threat"},
  {a:"RA",f:"Registration Authority",d:"Entity that verifies identity before a CA issues a digital certificate.",c:"crypto",why:"Verifies identities on a CA's behalf, vetting requesters before certificates are issued."},
  {a:"RACE",f:"Research and Development in Advanced Communications Technologies in Europe",d:"European research initiative that produced cryptographic algorithms like RIPEMD.",c:"crypto",legacy:"A defunct 1990s EU research program. It survives mainly as the 'R' in RIPEMD."},
  {a:"RAD",f:"Rapid Application Development",d:"Software development methodology emphasizing speed — security must be integrated, not bolted on.",c:"compliance"},
  {a:"RAID",f:"Redundant Array of Inexpensive Disks",d:"Storage technology combining multiple drives for redundancy or performance — relevant in data availability.",c:"infra"},
  {a:"RAS",f:"Remote Access Server",d:"Server enabling remote users to connect to an internal network — a key attack target.",c:"network",why:"A server that lets remote users dial or tunnel into the internal network.",ex:"Remote staff connecting through a RAS in the days before VPNs were standard."},
  {a:"RFID",f:"Radio Frequency Identification",d:"Wireless technology using electromagnetic fields to identify tags — used in access badges and asset tracking.",c:"identity",why:"Short-range radio tags for identification, used in access badges and asset tracking. Clonable if unprotected.",ex:"Badging into a building with an RFID access card.",domains:["iam"]},
  {a:"RIPEMD",f:"RACE Integrity Primitives Evaluation Message Digest",d:"Cryptographic hash function family developed in Europe — alternative to SHA.",c:"crypto",why:"A hash family that's an alternative to SHA. RIPEMD-160 still shows up in Bitcoin addresses, though SHA-2 dominates elsewhere."},
  {a:"ROI",f:"Return on Investment",d:"Financial metric used to justify security spending by comparing cost to risk reduction benefit.",c:"compliance"},
  {a:"RTBH",f:"Remotely Triggered Black Hole",d:"Network technique dropping traffic from specific sources to mitigate DDoS attacks at the routing level.",c:"network",why:"A defense that drops traffic to a targeted IP at the router edge to absorb a DDoS.",ex:"Black-holing a flooded server's IP upstream so the rest of the network survives.",domains:["net"]},
  {a:"RTP",f:"Real-time Transport Protocol",d:"Protocol for delivering audio and video over IP networks — used in VoIP and video conferencing.",c:"protocol"},

  {a:"SIM",f:"Subscriber Identity Module",d:"Smart card in mobile devices storing identity credentials — target of SIM swapping attacks.",c:"identity",why:"The smart card that holds a phone's identity on a mobile network, and the target of SIM-swap attacks.",ex:"An attacker hijacking SMS-based MFA by social-engineering a SIM swap.",domains:["iam", "secplus"]},
  {a:"SMS",f:"Short Message Service",d:"Text messaging protocol — used as an MFA factor and a vector for smishing attacks.",c:"threat"},

  {a:"TGT",f:"Ticket Granting Ticket",d:"Kerberos token issued after initial authentication used to request service tickets without re-entering credentials.",c:"identity",why:"The initial Kerberos ticket that lets you request services without re-entering your password.",ex:"A stolen TGT being abused in a Golden Ticket attack to reach file shares.",domains:["iam"]},

  {a:"VBA",f:"Visual Basic for Applications",d:"Microsoft scripting language embedded in Office documents — heavily abused in macro malware.",c:"threat"},
  {a:"VDE",f:"Virtual Desktop Environment",d:"Isolated virtual desktop instance — similar to VDI, used to contain user activity.",c:"infra"},

  {a:"WPA2",f:"Wi-Fi Protected Access 2",d:"Current mainstream Wi-Fi security standard using AES/CCMP encryption — replaced WPA.",c:"crypto",why:"The long-time Wi-Fi security standard, using AES-CCMP. Still common, though WPA3 improves on it.",domains:["net", "secplus"]},
  {a:"WPA3",f:"Wi-Fi Protected Access 3",d:"Latest Wi-Fi security standard using SAE instead of PSK — provides stronger protection against brute-force attacks.",c:"crypto",why:"The current Wi-Fi security standard. Its SAE handshake resists the password-guessing attacks that hit WPA2.",domains:["net", "secplus"]},
