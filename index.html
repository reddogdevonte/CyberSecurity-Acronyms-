const labelMap = {
  network:"Network", threat:"Threat & Attack", crypto:"Crypto & Privacy",
  compliance:"Compliance & GRC", protocol:"Protocols", identity:"Identity & Access",
  operations:"Operations & IR", infra:"Infrastructure"
};

// Study tracks — a second, multi-tag axis (a term can belong to several). Separate
// from the color categories above; see the optional `domains` array on data entries.
const domainMap = {
  iam:"IAM", grc:"GRC", soc:"SOC / Blue Team", net:"Networking",
  cloud:"Cloud Security", ti:"Threat Intel", compliance:"Compliance", secplus:"Security+ Core"
};

let currentCat = '';
let currentView = 'grid';

// Canonical page URL — used for copy-watermarking, share, and structured data.
const PAGE_URL = window.location.origin + window.location.pathname;
const COPY_SRC = '\n\nSource: ' + PAGE_URL;

// ── Favorites ──
let favs = new Set();
try { favs = new Set(JSON.parse(localStorage.getItem('cyberfavs') || '[]')); } catch(e) {}
function saveFavs() {
  try { localStorage.setItem('cyberfavs', JSON.stringify([...favs])); } catch(e) {}
}
function toggleFav(a, btn, ev) {
  if (ev) ev.stopPropagation();
  if (favs.has(a)) favs.delete(a); else favs.add(a);
  saveFavs();
  if (currentCat === 'starred') {
    render();                                  // card leaves/enters the starred view
  } else {
    const on = favs.has(a);
    btn.classList.toggle('faved', on);
    btn.textContent = on ? '★' : '☆';
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
    updateFilterCounts(document.getElementById('search').value.toLowerCase());
  }
}

// Shared predicates (used by render, updateFilterCounts, and quiz)
function matchQuery(x, q) {
  return !q || x.a.toLowerCase().includes(q) || x.f.toLowerCase().includes(q) || x.d.toLowerCase().includes(q);
}
function matchCat(x, cat) {
  if (!cat) return true;
  if (cat === 'starred') return favs.has(x.a);
  if (cat.indexOf('domain:') === 0) return Array.isArray(x.domains) && x.domains.includes(cat.slice(7));
  return x.c === cat;
}

function anchorId(a) {
  return 'card-' + a.replace(/[^a-zA-Z0-9]/g, '_');
}

function saveState() {
  const q = document.getElementById('search').value;
  try {
    localStorage.setItem('cybercat', currentCat);
    localStorage.setItem('cyberview', currentView);
  } catch(e) {}
  const params = new URLSearchParams();
  if (currentCat) params.set('cat', currentCat);
  if (q) params.set('q', q);
  const qs = params.toString();
  history.replaceState(null, '', (qs ? '?' + qs : window.location.pathname) + window.location.hash);
}

function setFilter(cat) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  render();
  saveState();
}

function setView(v) {
  currentView = v;
  const grid = document.getElementById('grid');
  grid.classList.toggle('list-view', v === 'list');
  document.getElementById('grid-btn').classList.toggle('active', v === 'grid');
  document.getElementById('list-btn').classList.toggle('active', v === 'list');
  try { localStorage.setItem('cyberview', v); } catch(e) {}
}

function escAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Toggle the element immediately after a disclosure button (Career, Interview, Show-answer).
// Relative traversal keeps it self-contained so a full re-render resets every card cleanly.
function toggleNext(btn) {
  const el = btn.nextElementSibling;
  if (el) el.classList.toggle('hidden');
}

function copyCard(btn) {
  const text = btn.dataset.a + ' — ' + btn.dataset.f + ': ' + btn.dataset.d + COPY_SRC;
  function onSuccess() {
    btn.textContent = '✓';
    btn.dataset.tip = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '⎘';
      btn.dataset.tip = 'Copy definition';
      btn.classList.remove('copied');
    }, 1400);
  }
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(() => fallbackCopy(text, onSuccess));
  } else {
    fallbackCopy(text, onSuccess);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); cb(); } catch(e) {}
  document.body.removeChild(ta);
}

function setHash(acronym) {
  history.replaceState(null, '', '#' + encodeURIComponent(acronym));
}

function jumpToLetter(letter) {
  const cards = document.querySelectorAll('.card');
  for (const card of cards) {
    const t = card.querySelector('.acronym-text');
    if (t && t.textContent.trim()[0].toUpperCase() === letter) {
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
      break;
    }
  }
}

function updateAZNav(filtered) {
  const activeLetters = new Set(filtered.map(x => x.a[0].toUpperCase()));
  const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  document.getElementById('az-nav').innerHTML = chars.map(c =>
    `<button class="az-btn${activeLetters.has(c) ? '' : ' az-disabled'}" onclick="jumpToLetter('${c}')">${c}</button>`
  ).join('');
}

function updateFilterCounts(q) {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const cat = btn.dataset.cat;
    const label = btn.dataset.label;
    const count = data.filter(x => matchQuery(x, q) && matchCat(x, cat)).length;
    btn.textContent = label + ' (' + count + ')';
  });
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = data.filter(x => matchQuery(x, q) && matchCat(x, currentCat));

  document.getElementById('stats').innerHTML =
    'Showing <span>' + filtered.length + '</span> of <span>' + data.length + '</span> acronyms';

  updateAZNav(filtered);
  updateFilterCounts(q);

  const grid = document.getElementById('grid');

  if (!filtered.length) {
    if (currentCat === 'starred' && !q) {
      grid.innerHTML = '<div class="no-results">No starred acronyms yet — tap the <span>☆</span> on any card to save it for later.</div>';
    } else {
      const safeQ = document.getElementById('search').value.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      grid.innerHTML = '<div class="no-results">No results for "<span>' + safeQ + '</span>"</div>';
    }
    return;
  }

  const makeCard = (x, i, listView) => {
    const id = anchorId(x.a);
    const aEsc = x.a.replace(/'/g,"\\'");
    const on = favs.has(x.a);
    const favBtn = '<button class="fav-btn' + (on ? ' faved' : '') + '" aria-pressed="' + on + '" title="' +
      (on ? 'Unstar' : 'Star') + '" aria-label="Star ' + escAttr(x.a) + '" onclick="toggleFav(\'' + aEsc + '\', this, event)">' +
      (on ? '★' : '☆') + '</button>';
    const copyBtn = '<button class="copy-btn" data-a="' + escAttr(x.a) + '" data-f="' + escAttr(x.f) + '" data-d="' + escAttr(x.d) + '" data-tip="Copy definition" onclick="event.stopPropagation();copyCard(this)">⎘</button>';
    const legacyTag = x.legacy ? '<span class="legacy-tag" title="Legacy / historical — not commonly used today">⏳ Legacy</span>' : '';

    // ── Optional authored depth (renders only when the data exists) ──
    const legacyHtml = x.legacy ? '<div class="legacy-note"><span class="ctx-label">Legacy</span>' + x.legacy + '</div>' : '';
    const domHtml = (Array.isArray(x.domains) && x.domains.length)
      ? '<div class="domain-row">' + x.domains.map(d =>
          '<span class="domain-chip" onclick="event.stopPropagation();setFilter(\'domain:' + d + '\')" title="Filter by ' + (domainMap[d] || d) + '">' + (domainMap[d] || d) + '</span>'
        ).join('') + '</div>'
      : '';
    const whyHtml = x.why ? '<div class="why"><span class="ctx-label">Why it matters</span>' + x.why + '</div>' : '';
    const exHtml  = x.ex  ? '<div class="example"><span class="ctx-label">Example</span>' + x.ex + '</div>' : '';
    let careerHtml = '';
    if (x.roles || x.tools) {
      careerHtml = '<button class="depth-btn" onclick="event.stopPropagation();toggleNext(this)">💼 Career</button>' +
        '<div class="depth hidden">' +
          (x.roles ? '<div class="depth-sub"><span class="ctx-label">Common roles</span><div class="pill-row">' +
            x.roles.map(r => '<span class="pill">' + r + '</span>').join('') + '</div></div>' : '') +
          (x.tools ? '<div class="depth-sub"><span class="ctx-label">Tools</span><div class="pill-row">' +
            x.tools.map(t => '<span class="pill">' + t + '</span>').join('') + '</div></div>' : '') +
        '</div>';
    }
    let iqHtml = '';
    if (x.iq) {
      iqHtml = '<button class="depth-btn" onclick="event.stopPropagation();toggleNext(this)">🎤 Interview question</button>' +
        '<div class="depth hidden">' +
          '<div class="iq">' + x.iq + '</div>' +
          '<button class="reveal-btn" onclick="event.stopPropagation();toggleNext(this)">Show answer</button>' +
          '<div class="ia hidden">' + (x.ia || '') + '</div>' +
        '</div>';
    }
    const extra = legacyHtml + domHtml + whyHtml + exHtml + careerHtml + iqHtml;

    if (listView) {
      return '<div class="card" id="' + id + '" data-cat="' + x.c + '" style="animation-delay:' + Math.min(i*0.02,0.4) + 's">' +
        '<div class="list-left">' +
          '<span class="acronym-text" onclick="setHash(\'' + aEsc + '\')" title="Copy link">' + x.a + '</span>' +
          '<span class="badge">' + labelMap[x.c] + '</span>' +
          legacyTag +
        '</div>' +
        '<div class="list-body">' +
          '<div class="full-name">' + x.f + '</div>' +
          '<div class="definition">' + x.d + '</div>' +
          extra +
        '</div>' +
        favBtn +
        copyBtn +
      '</div>';
    }
    return '<div class="card" id="' + id + '" data-cat="' + x.c + '" style="animation-delay:' + Math.min(i*0.02,0.4) + 's">' +
      '<div class="card-header">' +
        '<div class="card-header-left">' +
          '<span class="acronym-text" onclick="setHash(\'' + aEsc + '\')" title="Copy link">' + x.a + '</span>' +
        '</div>' +
        '<span class="badge">' + labelMap[x.c] + '</span>' +
        legacyTag +
        favBtn +
        copyBtn +
      '</div>' +
      '<div class="full-name">' + x.f + '</div>' +
      '<div class="definition">' + x.d + '</div>' +
      extra +
    '</div>';
  };

  grid.innerHTML = filtered.map((x, i) => makeCard(x, i, currentView === 'list')).join('');
}

function initFromHash() {
  const hash = decodeURIComponent(window.location.hash.slice(1));
  if (!hash) return;
  const match = data.find(x => x.a.toLowerCase() === hash.toLowerCase());
  if (!match) return;
  // Deep link always overrides saved filter so the card is always visible
  currentCat = '';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === ''));
  document.getElementById('search').value = match.a;
  render();
  setTimeout(() => {
    const el = document.getElementById(anchorId(match.a));
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.add('highlighted');
    }
  }, 120);
}

// Init
document.getElementById('total-count').textContent = data.length;
document.getElementById('footer').textContent =
  'CYBERSECURITY ACRONYM REFERENCE  ·  ' + data.length + ' TERMS  ·  © ' + new Date().getFullYear() + ' reddogdevonte.github.io';
// Sort alphabetically
data.sort((a, b) => a.a.localeCompare(b.a, undefined, {sensitivity: 'base'}));

// SEO: inject schema.org DefinedTermSet structured data from the single source of
// truth (the data array), so search engines can index every acronym as a defined term.
(function injectGlossarySchema() {
  const ld = {
    "@context": "https://schema.org",
    "@type": "DefinedTermSet",
    "name": "Cybersecurity Acronyms Reference",
    "description": "A searchable reference of " + data.length +
      " cybersecurity acronyms with full definitions, organized by category.",
    "url": PAGE_URL,
    "inLanguage": "en",
    "hasDefinedTerm": data.map(function(x) {
      return { "@type": "DefinedTerm", "name": x.a, "description": x.f + " — " + x.d + (x.why ? " " + x.why : "") };
    })
  };
  const s = document.createElement('script');
  s.type = 'application/ld+json';
  s.textContent = JSON.stringify(ld);
  document.head.appendChild(s);
})();

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  const search = document.getElementById('search');
  // While the quiz is open it fully owns Enter/Esc.
  if (quiz) {
    if (e.key === 'Escape') { e.preventDefault(); closeQuiz(); }
    else if (e.key === 'Enter') { e.preventDefault(); quizAction(); }
    return;
  }
  if (e.key === '/' && document.activeElement !== search) {
    e.preventDefault();
    search.focus();
    search.select();
  }
  if ((e.key === 'q' || e.key === 'Q') && document.activeElement !== search) {
    e.preventDefault();
    startQuiz();
  }
  if (e.key === 'Escape') {
    closeShare();
    if (search.value) { search.value = ''; render(); saveState(); }
    else search.blur();
  }
});

// Watermark substantial copies with a source link (content protection + backlinks).
// Small selections (search terms, a single word) are left untouched. The copy-button
// path appends its own source line, so this only affects manual text selection.
document.addEventListener('copy', function(e) {
  try {
    const sel = window.getSelection().toString();
    if (sel && sel.trim().length > 60 && e.clipboardData) {
      e.clipboardData.setData('text/plain', sel + COPY_SRC);
      e.preventDefault();
    }
  } catch (err) {}
});

// Restore state: URL params take priority, localStorage as fallback
(function restoreState() {
  const params = new URLSearchParams(window.location.search);
  const urlCat = params.get('cat') || '';
  const urlQ   = params.get('q')   || '';
  let storedView = 'grid';
  try { storedView = localStorage.getItem('cyberview') || 'grid'; } catch(e) {}

  if (urlQ) document.getElementById('search').value = urlQ;

  const cat = urlCat || (() => { try { return localStorage.getItem('cybercat') || ''; } catch(e) { return ''; } })();
  if (cat) {
    currentCat = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  }
  if (storedView === 'list') setView('list');
})();

render();
initFromHash();

// ── Share ──
const SITE_URL  = window.location.origin + window.location.pathname;
const SHARE_TXT = 'Cybersecurity Acronym Reference — ' + data.length + ' acronyms, searchable & filterable by category.';

document.addEventListener('DOMContentLoaded', function() {
  const u = encodeURIComponent(SITE_URL);
  const t = encodeURIComponent(SHARE_TXT);
  document.getElementById('sh-twitter').href  = 'https://twitter.com/intent/tweet?text=' + t + '&url=' + u;
  document.getElementById('sh-facebook').href = 'https://www.facebook.com/sharer/sharer.php?u=' + u;
  document.getElementById('sh-linkedin').href = 'https://www.linkedin.com/sharing/share-offsite/?url=' + u;
  document.getElementById('sh-reddit').href   = 'https://reddit.com/submit?url=' + u + '&title=' + t;
  if (navigator.share) document.getElementById('sh-native').style.display = 'flex';
});

function toggleShare() {
  const panel = document.getElementById('share-panel');
  const open  = panel.classList.contains('open');
  if (open) closeShare();
  else {
    panel.classList.add('open');
    document.getElementById('share-backdrop').style.display = 'block';
    document.getElementById('share-fab-btn').setAttribute('aria-expanded', 'true');
  }
}

function closeShare() {
  document.getElementById('share-panel').classList.remove('open');
  document.getElementById('share-backdrop').style.display = 'none';
  document.getElementById('share-fab-btn').setAttribute('aria-expanded', 'false');
}

function shareCopyLink() {
  const btn  = document.getElementById('sh-copy');
  const orig = btn.innerHTML;
  function onDone() {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
    setTimeout(() => { btn.innerHTML = orig; }, 1500);
  }
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(SITE_URL).then(onDone).catch(() => fallbackCopy(SITE_URL, onDone));
  } else {
    fallbackCopy(SITE_URL, onDone);
  }
}

function shareNative() {
  if (navigator.share) navigator.share({ title: 'Cybersecurity Acronyms Reference', text: SHARE_TXT, url: SITE_URL }).catch(() => {});
}

// ── Quiz mode (flashcards) ──
let quiz = null; // { deck, i, score, missed:[], checked, lastCorrect }

function quizPool() {
  const q = document.getElementById('search').value.toLowerCase();
  const pool = data.filter(x => matchQuery(x, q) && matchCat(x, currentCat));
  return pool.length ? pool : data.slice();   // never start an empty quiz
}

function shuffle(arr) {
  for (let j = arr.length - 1; j > 0; j--) {
    const k = (Math.random() * (j + 1)) | 0;
    [arr[j], arr[k]] = [arr[k], arr[j]];
  }
  return arr;
}

function normAns(s) {
  return s.toLowerCase().replace(/[^a-z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim();
}

function startQuiz(deck) {
  const pool = (deck && deck.length) ? deck.slice() : quizPool();
  quiz = { deck: shuffle(pool), i: 0, score: 0, missed: [], checked: false, lastCorrect: false };
  document.getElementById('quiz-overlay').classList.add('open');
  showQuizCard();
}

function showQuizCard() {
  const x = quiz.deck[quiz.i];
  const total = quiz.deck.length;
  document.getElementById('quiz-progress').textContent = (quiz.i + 1) + ' / ' + total;
  document.getElementById('quiz-score').textContent = quiz.score;
  document.getElementById('quiz-bar').style.width = (quiz.i / total * 100) + '%';
  quiz.checked = false;
  document.getElementById('quiz-body').innerHTML =
    '<div class="quiz-prompt">What does this stand for?</div>' +
    '<div class="quiz-acronym">' + x.a + '</div>' +
    '<span class="badge">' + labelMap[x.c] + '</span>' +
    '<input id="quiz-input" class="quiz-input" placeholder="Type the full name… (Enter to check)" autocomplete="off" autocapitalize="off" spellcheck="false" />' +
    '<div class="quiz-reveal" id="quiz-reveal"></div>' +
    '<button class="quiz-action" id="quiz-action" onclick="quizAction()">Check</button>';
  document.getElementById('quiz-input').focus();
}

function quizAction() {
  if (!quiz) return;
  if (!quiz.checked) checkQuiz();
  else nextQuiz();
}

function checkQuiz() {
  const x = quiz.deck[quiz.i];
  const input = document.getElementById('quiz-input');
  const val = normAns(input.value);
  const correct = val !== '' && val === normAns(x.f);
  quiz.checked = true;
  quiz.lastCorrect = correct;
  if (correct) quiz.score++; else quiz.missed.push(x);
  input.disabled = true;

  const reveal = document.getElementById('quiz-reveal');
  reveal.className = 'quiz-reveal show ' + (correct ? 'correct' : 'wrong');
  reveal.innerHTML =
    '<div class="verdict">' + (correct ? '✓ Correct' : '✗ Not quite') + '</div>' +
    '<div class="ans-name">' + x.f + '</div>' +
    '<div class="ans-def">' + x.d + '</div>' +
    (correct ? '' : '<button class="quiz-override" onclick="quizOverride()">I was right →</button>');

  document.getElementById('quiz-score').textContent = quiz.score;
  const action = document.getElementById('quiz-action');
  action.textContent = (quiz.i + 1 >= quiz.deck.length) ? 'See results' : 'Next →';
  action.focus();
}

function quizOverride() {
  if (!quiz || quiz.lastCorrect) return;
  quiz.lastCorrect = true;
  quiz.score++;
  const idx = quiz.missed.lastIndexOf(quiz.deck[quiz.i]);
  if (idx > -1) quiz.missed.splice(idx, 1);
  document.getElementById('quiz-score').textContent = quiz.score;
  const reveal = document.getElementById('quiz-reveal');
  reveal.className = 'quiz-reveal show correct';
  reveal.querySelector('.verdict').textContent = '✓ Marked correct';
  const ov = reveal.querySelector('.quiz-override');
  if (ov) ov.remove();
}

function nextQuiz() {
  quiz.i++;
  if (quiz.i >= quiz.deck.length) showQuizResults();
  else showQuizCard();
}

function showQuizResults() {
  const total = quiz.deck.length;
  const pct = Math.round(quiz.score / total * 100);
  const missedCount = quiz.missed.length;
  document.getElementById('quiz-progress').textContent = 'Done';
  document.getElementById('quiz-score').textContent = quiz.score;
  document.getElementById('quiz-bar').style.width = '100%';
  document.getElementById('quiz-body').innerHTML =
    '<div class="quiz-results">' +
      '<div class="quiz-pct">' + pct + '%</div>' +
      '<div class="quiz-detail">' + quiz.score + ' of ' + total + ' correct' +
        (missedCount ? ' · ' + missedCount + ' to review' : ' · perfect run!') + '</div>' +
      '<div class="quiz-results-actions">' +
        (missedCount ? '<button class="quiz-btn-primary" onclick="reviewMissed()">Review ' + missedCount + ' missed</button>' : '') +
        '<button class="quiz-btn-ghost" onclick="startQuiz()">Restart full quiz</button>' +
        '<button class="quiz-btn-ghost" onclick="closeQuiz()">Close</button>' +
      '</div>' +
    '</div>';
}

function reviewMissed() {
  startQuiz(quiz.missed.slice());
}

function closeQuiz() {
  document.getElementById('quiz-overlay').classList.remove('open');
  quiz = null;
}
</script>
