<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e14;
    --surface: #111720;
    --surface2: #19212e;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8edf4;
    --muted: #7d8fa8;
    --accent: #00e5a0;
    --accent2: #0099ff;
    --network: #0099ff;
    --threat: #ff4757;
    --crypto: #a78bfa;
    --compliance: #34d399;
    --protocol: #38bdf8;
    --identity: #fb923c;
    --operations: #f472b6;
    --infra: #facc15;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    padding: 3rem 2rem 2rem;
    max-width: 1200px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }

  .header-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: clamp(1.8rem, 5vw, 3.2rem);
    font-weight: 600;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 2rem;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 420px;
  }

  .search-kbd {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 2px 6px;
    pointer-events: none;
    transition: opacity 0.15s;
  }

  #search:focus ~ .search-kbd { opacity: 0; }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
    width: 16px; height: 16px;
  }

  input[type="text"] {
    width: 100%;
    padding: 10px 48px 10px 38px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 8px 14px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { color: var(--bg); font-weight: 600; }

  .filter-btn[data-cat=""].active    { background: var(--accent); border-color: var(--accent); }
  .filter-btn[data-cat="network"].active    { background: var(--network); border-color: var(--network); }
  .filter-btn[data-cat="threat"].active     { background: var(--threat); border-color: var(--threat); }
  .filter-btn[data-cat="crypto"].active     { background: var(--crypto); border-color: var(--crypto); }
  .filter-btn[data-cat="compliance"].active { background: var(--compliance); border-color: var(--compliance); }
  .filter-btn[data-cat="protocol"].active   { background: var(--protocol); border-color: var(--protocol); }
  .filter-btn[data-cat="identity"].active   { background: var(--identity); border-color: var(--identity); }
  .filter-btn[data-cat="operations"].active { background: var(--operations); border-color: var(--operations); }
  .filter-btn[data-cat="infra"].active      { background: var(--infra); border-color: var(--infra); }

  /* A-Z nav */
  .az-nav {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0.75rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
  }

  .az-btn {
    padding: 4px 7px;
    border-radius: 3px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.12s;
    min-width: 26px;
    text-align: center;
  }

  .az-btn:hover:not(.az-disabled) { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  .az-btn.az-disabled { opacity: 0.25; cursor: default; pointer-events: none; }

  main {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
  }

  .stats-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    gap: 8px;
  }

  .stats-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .stats-count span { color: var(--accent); }

  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    padding: 6px 10px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
  }
  .view-btn.active { background: var(--surface2); color: var(--text); }

  /* CARD GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .grid.list-view {
    grid-template-columns: 1fr;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    cursor: default;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    animation: fadeIn 0.3s ease both;
    /* no overflow:hidden — lets the copy tooltip escape the card boundary */
    z-index: 1;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 8px 8px 0 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover { border-color: var(--border2); transform: translateY(-1px); z-index: 10; }
  .card:hover::before { opacity: 1; }
  .card:hover .copy-btn { opacity: 1; }

  .card[data-cat="network"]::before    { background: var(--network); }
  .card[data-cat="threat"]::before     { background: var(--threat); }
  .card[data-cat="crypto"]::before     { background: var(--crypto); }
  .card[data-cat="compliance"]::before { background: var(--compliance); }
  .card[data-cat="protocol"]::before   { background: var(--protocol); }
  .card[data-cat="identity"]::before   { background: var(--identity); }
  .card[data-cat="operations"]::before { background: var(--operations); }
  .card[data-cat="infra"]::before      { background: var(--infra); }

  .card.highlighted {
    animation: highlight 1.8s ease both;
  }

  @keyframes highlight {
    0%   { box-shadow: 0 0 0 2px var(--accent); border-color: var(--accent); }
    70%  { box-shadow: 0 0 0 2px var(--accent); border-color: var(--accent); }
    100% { box-shadow: none; border-color: var(--border); }
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }

  .card-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }

  .acronym-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 24px;
    font-weight: 600;
    line-height: 1;
    cursor: pointer;
    text-decoration: none;
  }

  .acronym-text:hover { text-decoration: underline; text-underline-offset: 3px; }

  .card[data-cat="network"]    .acronym-text { color: var(--network); }
  .card[data-cat="threat"]     .acronym-text { color: var(--threat); }
  .card[data-cat="crypto"]     .acronym-text { color: var(--crypto); }
  .card[data-cat="compliance"] .acronym-text { color: var(--compliance); }
  .card[data-cat="protocol"]   .acronym-text { color: var(--protocol); }
  .card[data-cat="identity"]   .acronym-text { color: var(--identity); }
  .card[data-cat="operations"] .acronym-text { color: var(--operations); }
  .card[data-cat="infra"]      .acronym-text { color: var(--infra); }

  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card[data-cat="network"]    .badge { background: rgba(0,153,255,0.12); color: var(--network); }
  .card[data-cat="threat"]     .badge { background: rgba(255,71,87,0.12); color: var(--threat); }
  .card[data-cat="crypto"]     .badge { background: rgba(167,139,250,0.12); color: var(--crypto); }
  .card[data-cat="compliance"] .badge { background: rgba(52,211,153,0.12); color: var(--compliance); }
  .card[data-cat="protocol"]   .badge { background: rgba(56,189,248,0.12); color: var(--protocol); }
  .card[data-cat="identity"]   .badge { background: rgba(251,146,60,0.12); color: var(--identity); }
  .card[data-cat="operations"] .badge { background: rgba(244,114,182,0.12); color: var(--operations); }
  .card[data-cat="infra"]      .badge { background: rgba(250,204,21,0.12); color: var(--infra); }

  .copy-btn {
    opacity: 0;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--muted);
    font-size: 12px;
    padding: 3px 7px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    font-family: 'IBM Plex Mono', monospace;
    position: relative;
  }

  .copy-btn::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 7px);
    right: 0;
    background: var(--surface2);
    color: var(--text);
    font-size: 11px;
    padding: 5px 9px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
  }

  .copy-btn:hover::after { opacity: 1; }
  .copy-btn.copied::after { opacity: 1; }

  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .copy-btn.copied { opacity: 1; color: var(--accent); border-color: var(--accent); }

  /* ── Favorite (star) button ── always visible so saved items are scannable ── */
  .fav-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 17px;
    line-height: 1;
    padding: 2px 4px;
    cursor: pointer;
    flex-shrink: 0;
    opacity: 0.45;
    transition: opacity 0.15s, color 0.15s, transform 0.12s;
  }
  .fav-btn:hover { opacity: 1; color: #fbbf24; transform: scale(1.15); }
  .fav-btn.faved { opacity: 1; color: #fbbf24; }

  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }

  .filter-btn:focus-visible,
  .view-btn:focus-visible,
  .az-btn:focus-visible,
  .copy-btn:focus-visible,
  .fav-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  /* ── Quiz "Quiz me" launcher (in stats-bar) ── */
  .quiz-launch {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    box-shadow: 0 2px 12px rgba(0,229,160,0.25);
  }
  .quiz-launch:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(0,229,160,0.4); }
  .quiz-launch:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; transform: none; }

  .full-name {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 7px;
    font-weight: 300;
    line-height: 1.4;
  }

  .definition {
    font-size: 15px;
    color: #aab4c4;
    line-height: 1.6;
    font-weight: 300;
  }

  /* ── Study-tracks (domain) filter row ── */
  .domain-filters {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
  }
  .track-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 2px;
  }
  .domain-btn { border-style: dashed; }
  .domain-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    border-style: solid;
  }

  /* ── Authored depth on cards ── */
  .domain-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 2px; }
  .domain-chip {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.04em;
    padding: 3px 9px;
    border-radius: 50px;
    border: 1px dashed var(--border2);
    color: var(--muted);
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .domain-chip:hover { color: var(--accent); border-color: var(--accent); }

  .ctx-label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 3px;
    opacity: 0.85;
  }
  .why, .example {
    font-size: 13px;
    line-height: 1.5;
    margin-top: 11px;
    color: #c2ccda;
    font-weight: 300;
  }
  .example { color: var(--muted); }

  .depth-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin: 12px 8px 0 0;
    padding: 6px 12px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 50px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .depth-btn:hover { border-color: var(--accent); color: var(--accent); }

  .depth {
    margin-top: 12px;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .depth-sub + .depth-sub { margin-top: 12px; }
  .pill-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 5px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .iq { font-size: 13.5px; line-height: 1.5; color: var(--text); font-weight: 400; }
  .reveal-btn {
    margin-top: 10px;
    padding: 5px 12px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reveal-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ia {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.55;
    color: #aab4c4;
    font-weight: 300;
  }
  .hidden { display: none !important; }

  /* ── Legacy / historical marker ── */
  .legacy-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
    background: rgba(245,158,11,0.12);
    color: #f59e0b;
    border: 1px solid rgba(245,158,11,0.3);
  }
  .legacy-note {
    font-size: 13px;
    line-height: 1.5;
    margin-top: 11px;
    color: #d6b272;
    font-weight: 300;
  }
  .legacy-note .ctx-label { color: #f59e0b; }

  /* LIST VIEW card tweaks */
  .list-view .card {
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 20px;
    padding: 14px 18px;
  }

  .list-view .list-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 120px;
    flex-shrink: 0;
  }

  .list-view .list-body {
    flex: 1;
    min-width: 0;
  }

  .list-view .list-body .full-name { margin-bottom: 5px; }

  .list-view .copy-btn {
    flex-shrink: 0;
    opacity: 1;
    margin-top: 2px;
  }

  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
  }

  .no-results span { color: var(--accent); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  @media (max-width: 600px) {

    .definition { font-size: 13px; }

    .az-nav { padding-left: 1rem; padding-right: 1rem; }
    .copy-btn { opacity: 1; }
    .share-fab { bottom: 16px; right: 16px; }
    .share-panel { min-width: 190px; }

  /* ── Share FAB ── */
  .share-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }

  .share-fab-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 20px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 50px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,229,160,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 0.03em;
  }

  .share-fab-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px rgba(0,229,160,0.45);
  }

  .share-panel {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 16px;
    min-width: 220px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    display: none;
    flex-direction: column;
    gap: 6px;
    transform-origin: bottom right;
    animation: shareIn 0.18s ease both;
  }

  .share-panel.open { display: flex; }

  @keyframes shareIn {
    from { opacity: 0; transform: scale(0.94) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .share-panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
    padding: 0 2px;
  }

  .share-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    white-space: nowrap;
  }

  .share-link:hover {
    border-color: var(--border2);
    background: var(--surface2);
    color: var(--accent);
  }

  .share-link svg { width: 15px; height: 15px; flex-shrink: 0; }

  .share-divider { height: 1px; background: var(--border); margin: 4px 0; }

  /* ── Quiz overlay ── */
  .quiz-overlay {
    position: fixed;
    inset: 0;
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(5,8,12,0.78);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .quiz-overlay.open { display: flex; }

  .quiz-card {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 32px 32px 28px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.7);
    position: relative;
    transform-origin: center;
    animation: shareIn 0.2s ease both;
  }

  .quiz-close {
    position: absolute;
    top: 16px; right: 18px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    transition: color 0.15s;
  }
  .quiz-close:hover { color: var(--text); }

  .quiz-progress {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .quiz-progress .quiz-score { color: var(--accent); }

  .quiz-bar {
    height: 3px;
    border-radius: 2px;
    background: var(--border);
    margin-bottom: 26px;
    overflow: hidden;
  }
  .quiz-bar > span {
    display: block;
    height: 100%;
    background: var(--accent);
    transition: width 0.25s ease;
  }

  .quiz-prompt {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 300;
  }
  .quiz-acronym {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 46px;
    font-weight: 600;
    line-height: 1.05;
    color: var(--accent);
    word-break: break-word;
    margin-bottom: 12px;
  }
  .quiz-card .badge {
    background: var(--surface2);
    color: var(--muted);
    display: inline-block;
  }

  .quiz-input {
    width: 100%;
    margin-top: 20px;
    padding: 13px 15px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }
  .quiz-input:focus { border-color: var(--accent); }
  .quiz-input:disabled { opacity: 0.7; }

  .quiz-reveal {
    display: none;
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    font-size: 14px;
    line-height: 1.5;
  }
  .quiz-reveal.show { display: block; }
  .quiz-reveal .verdict {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .quiz-reveal.correct { border-color: rgba(0,229,160,0.4); }
  .quiz-reveal.correct .verdict { color: var(--accent); }
  .quiz-reveal.wrong { border-color: rgba(255,71,87,0.4); }
  .quiz-reveal.wrong .verdict { color: #ff4757; }
  .quiz-reveal .ans-name { color: var(--text); font-weight: 600; }
  .quiz-reveal .ans-def { color: var(--muted); margin-top: 5px; font-weight: 300; }
  .quiz-override {
    margin-top: 12px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .quiz-override:hover { color: var(--accent); border-color: var(--accent); }

  .quiz-action {
    width: 100%;
    margin-top: 22px;
    padding: 13px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .quiz-action:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,229,160,0.4); }

  /* Quiz results */
  .quiz-results { text-align: center; padding: 8px 0; }
  .quiz-results .quiz-pct {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 64px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
  }
  .quiz-results .quiz-detail { color: var(--muted); margin-top: 10px; font-size: 14px; }
  .quiz-results-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 26px; }
  .quiz-results-actions button {
    padding: 12px;
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .quiz-btn-primary { background: var(--accent); color: var(--bg); border: none; }
  .quiz-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,229,160,0.4); }
  .quiz-btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border2); }
  .quiz-btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Print: clean reference sheet, hide all interactive chrome ── */
  @media print {
    body { background: #fff !important; color: #000 !important; }
    header .controls,
    .header-tag,
    .az-nav,
    .stats-bar .view-toggle,
    .quiz-launch,
    .share-fab,
    #share-backdrop,
    .quiz-overlay,
    .copy-btn,
    .depth-btn,
    .depth,
    .domain-row,
    .fav-btn { display: none !important; }

    header { padding-bottom: 0; }
    h1, h1 span, .subtitle { color: #000 !important; }
    .stats-bar { border: none; }
    .stats-count, #stats { color: #000 !important; }

    .grid, .grid.list-view { display: block !important; }
    .card,
    .list-view .card {
      break-inside: avoid;
      page-break-inside: avoid;
      border: 1px solid #bbb !important;
      border-radius: 6px;
      box-shadow: none !important;
      transform: none !important;
      animation: none !important;
      background: #fff !important;
      margin: 0 0 8px !important;
      padding: 10px 12px !important;
      display: block !important;
    }
    .card::before { display: none !important; }
    .acronym-text { color: #000 !important; font-size: 15px !important; }
    .badge {
      background: #eee !important;
      color: #333 !important;
      border: 1px solid #ccc;
    }
    .full-name { color: #000 !important; font-weight: 600; }
    .definition { color: #222 !important; }
    .why, .example, .legacy-note { color: #222 !important; }
    .ctx-label { color: #000 !important; opacity: 1; }
    .legacy-tag { background: #eee !important; color: #333 !important; border: 1px solid #ccc; }
    footer { color: #000 !important; border-color: #ccc; }
  }
</style>

<script>
const data = [
  {a:"AAA",f:"Authentication, Authorization, Accounting",d:"Framework for controlling network access through user verification, permissions, and activity logging.",c:"identity",why:"The framework for controlled access: authenticate who you are, authorize what you can do, and record what you did.",ex:"A RADIUS server handling login, permissions, and session logging for network gear.",domains:["iam", "secplus"]},
  {a:"ACL",f:"Access Control List",d:"Rules that define which users or systems can access specific resources.",c:"identity",why:"A list of rules saying which users or systems may reach a resource, and how.",ex:"A firewall ACL permitting port 443 from one subnet and denying the rest.",domains:["iam", "secplus"]},
  {a:"AES",f:"Advanced Encryption Standard",d:"Symmetric block cipher widely used for data encryption, available in 128/192/256-bit key sizes.",c:"crypto",why:"The standard for fast symmetric encryption. It protects data at rest on disks and data in transit in TLS.",ex:"AES-256 encrypting a laptop's drive with BitLocker or FileVault.",domains:["secplus"],iq:"What is the difference between symmetric and asymmetric encryption?",ia:"Symmetric encryption like AES uses one shared key for both encryption and decryption. It's fast and good for bulk data, but you have to distribute the key securely. Asymmetric encryption like RSA uses a public/private key pair, which solves key distribution but runs much slower. In practice the two are combined: asymmetric encryption securely exchanges a symmetric session key, and that key encrypts the actual data. That's how TLS works."},
  {a:"APT",f:"Advanced Persistent Threat",d:"Sophisticated, long-term cyberattack by well-resourced adversaries targeting specific organizations.",c:"threat",why:"A well-resourced, patient adversary (often nation-state) that targets specific organizations for long-term access.",ex:"A state-sponsored group quietly maintaining access to a defense contractor for months.",domains:["ti", "soc"]},
  {a:"ARP",f:"Address Resolution Protocol",d:"Maps IP addresses to physical MAC addresses on a local network.",c:"protocol"},
  {a:"BYOD",f:"Bring Your Own Device",d:"Policy allowing employees to use personal devices for work, introducing unique security challenges.",c:"compliance"},
  {a:"CA",f:"Certificate Authority",d:"Trusted entity that issues digital certificates verifying the identity of websites and organizations.",c:"crypto",why:"Issues digital certificates and vouches for them, so your browser can trust a site is genuine.",ex:"DigiCert and Let's Encrypt are well-known CAs.",domains:["secplus"]},
  {a:"CASB",f:"Cloud Access Security Broker",d:"Security policy enforcement point between cloud users and cloud services.",c:"infra",why:"A control point between users and cloud apps that gives visibility and policy enforcement over SaaS usage.",ex:"Detecting and blocking uploads of confidential files to an unsanctioned personal Dropbox.",domains:["cloud"],tools:["Netskope", "Microsoft Defender for Cloud Apps", "Zscaler"]},
  {a:"CICD",f:"Continuous Integration / Continuous Deployment",d:"DevOps practice of automating build, test, and deployment pipelines.",c:"operations"},
  {a:"CISO",f:"Chief Information Security Officer",d:"Senior executive responsible for an organization's information and data security strategy.",c:"compliance",why:"The executive who owns security strategy and answers to the board. For many people it's the job they're working toward.",ex:"The CISO presenting the quarterly risk posture and budget asks to the board.",domains:["grc"],roles:["CISO", "Security Director"]},
  {a:"CTEM",f:"Continuous Threat Exposure Management",d:"Ongoing process to identify, assess, and reduce an organization's attack surface.",c:"threat"},
  {a:"CVE",f:"Common Vulnerabilities and Exposures",d:"Publicly disclosed cybersecurity vulnerabilities assigned a unique identifier.",c:"threat",why:"The universal ID system for known vulnerabilities, so the whole industry can reference the same flaw without ambiguity.",ex:"CVE-2021-44228 (Log4Shell): one identifier the entire world used to track and patch it.",domains:["ti", "secplus"]},
  {a:"CVSS",f:"Common Vulnerability Scoring System",d:"Standardized framework for rating the severity of security vulnerabilities on a 0–10 scale.",c:"threat",why:"Scores how severe a vulnerability is (0-10) so teams can prioritize what to patch first.",ex:"A CVSS 9.8 flaw jumps the patch queue ahead of a 4.2.",domains:["ti", "grc", "secplus"]},
  {a:"DDoS",f:"Distributed Denial of Service",d:"Attack that floods a target with traffic from many sources, making it unavailable.",c:"threat",why:"Overwhelms a target with traffic to knock it offline, one of the top availability threats for any public service.",ex:"A botnet flooding a website with millions of requests until it can't serve real users.",domains:["net", "ti", "secplus"]},
  {a:"DEP",f:"Data Execution Prevention",d:"Security feature that prevents code from running in memory regions marked as non-executable.",c:"threat"},
  {a:"DFIR",f:"Digital Forensics and Incident Response",d:"Combined discipline of investigating cyber incidents and collecting digital evidence.",c:"operations",why:"Combines forensics and incident response to answer what happened, how far it spread, and how to recover.",ex:"Imaging a compromised laptop and reconstructing the attacker's timeline from disk and memory artifacts.",domains:["soc"],roles:["Incident Responder", "Forensic Analyst"],tools:["Velociraptor", "Magnet AXIOM", "EnCase"]},
  {a:"DLP",f:"Data Loss Prevention",d:"Tools and policies that detect and prevent unauthorized transmission of sensitive data.",c:"compliance",why:"Stops sensitive data like PII, source code, and financials from leaving the organization, on purpose or by accident.",ex:"Blocking an email that contains a spreadsheet of customer credit-card numbers.",domains:["grc", "compliance", "secplus"],roles:["GRC Analyst", "Security Engineer"],tools:["Microsoft Purview", "Forcepoint", "Symantec DLP"]},
  {a:"DMZ",f:"Demilitarized Zone",d:"Network segment that separates internal systems from the public internet, hosting externally accessible services.",c:"network",why:"A network segment that exposes public-facing services while shielding the internal network behind it.",ex:"Putting a company's web and mail servers in a DMZ between two firewalls.",domains:["net", "secplus"]},
  {a:"DNS",f:"Domain Name System",d:"System that translates human-readable domain names into IP addresses.",c:"protocol",why:"Translates names to addresses for the entire internet, and it's a frequent target for hijacking and tunneling.",ex:"Resolving example.com to its IP. DNS logs are also gold for spotting C2 traffic.",domains:["net", "secplus"]},
  {a:"DoS",f:"Denial of Service",d:"Attack that overwhelms a system to make it unavailable to legitimate users.",c:"threat"},
  {a:"EAP",f:"Extensible Authentication Protocol",d:"Authentication framework used in wireless networks and point-to-point connections.",c:"protocol"},
  {a:"EDR",f:"Endpoint Detection and Response",d:"Security solution that monitors endpoints for suspicious behavior and enables investigation and remediation.",c:"operations",why:"Watches endpoints for malicious behavior and lets responders investigate and contain it, well beyond signature antivirus.",ex:"CrowdStrike Falcon detecting and killing a process that's encrypting files like ransomware.",domains:["soc", "secplus"],roles:["SOC Analyst", "Incident Responder"],tools:["CrowdStrike Falcon", "SentinelOne", "Microsoft Defender for Endpoint"]},
  {a:"EPSS",f:"Exploit Prediction Scoring System",d:"Model estimating the probability that a CVE will be exploited in the wild.",c:"threat",why:"Estimates the probability a vulnerability will actually be exploited, pairing real-world risk with CVSS severity.",ex:"Prioritizing a medium-CVSS bug with a high EPSS score because attackers are actively using it.",domains:["ti"]},

  {a:"FTP",f:"File Transfer Protocol",d:"Standard network protocol for transferring files — unencrypted, largely replaced by SFTP.",c:"protocol"},

  {a:"HIPAA",f:"Health Insurance Portability and Accountability Act",d:"US law protecting sensitive patient health information from disclosure without consent.",c:"compliance",why:"US law protecting patient health data. Non-compliance carries heavy fines and drives much of healthcare security.",ex:"Encrypting and access-logging electronic health records to meet the HIPAA Security Rule.",domains:["compliance", "grc"]},
  {a:"HIDS",f:"Host-based Intrusion Detection System",d:"Monitors a single host for suspicious activity and policy violations.",c:"operations"},
